Screens:
  scrSendEmail:
    Properties:
      Fill: =RGBA(255,255,255,1)
      OnVisible: |-
        =ClearCollect(colGroups, AddColumns(Sort('BM Groups', SortOrder, SortOrder.Ascending), Ticked, false));
        ClearCollect(colMemberships, 'BM Memberships');
        Set(varRecipientField, "bcc");
        Set(varBccForcedByBatch, false);
        Set(varBccForced, false);
        Set(varPreviewGroupID, Blank());
        Set(varShowLightbox, false)
    Children:
      - recHeader:
          Control: Classic/Button@2.2.0
          Properties:
            Text: =""
            DisplayMode: =DisplayMode.View
            Fill: =RGBA(0,78,66,1)
            HoverFill: =RGBA(0,78,66,1)
            PressedFill: =RGBA(0,78,66,1)
            BorderThickness: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            X: =0
            Y: =0
            Width: =1366
            Height: =72
      - lblHeaderTitle:
          Control: Label@2.5.1
          Properties:
            Text: ="Branch Contact Groups"
            Color: =RGBA(255,255,255,1)
            FontWeight: =FontWeight.Bold
            Size: =20
            Font: =Font.'Open Sans'
            X: =24
            Y: =10
            Width: =500
            Height: =32
      - lblHeaderSub:
          Control: Label@2.5.1
          Properties:
            Text: ="Send email to group members"
            Color: =RGBA(214,232,227,1)
            Size: =12
            Font: =Font.'Open Sans'
            X: =24
            Y: =42
            Width: =500
            Height: =22
      - btnManageNav:
          Control: ModernButton@1.0.0
          Properties:
            Text: ="Manage Groups"
            BasePaletteColor: =RGBA(46,110,145,1)
            Visible: =varIsMaintainer
            OnSelect: =Navigate(scrManageGroups, ScreenTransition.Cover)
            X: =1180
            Y: =16
            Width: =160
            Height: =40
      - lblLeftHeading:
          Control: Label@2.5.1
          Properties:
            Text: ="Groups"
            Color: =RGBA(31,58,95,1)
            FontWeight: =FontWeight.Bold
            Size: =16
            Font: =Font.'Open Sans'
            X: =20
            Y: =88
            Width: =300
            Height: =30
      - txtGroupSearch:
          Control: ModernTextInput@1.1.0
          Properties:
            Placeholder: ="Search groups by name..."
            X: =20
            Y: =122
            Width: =700
            Height: =40
      - galGroups:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            Items: =Filter(colGroups, (!Private || varIsMaintainer) && (IsBlank(Trim(txtGroupSearch.Text)) || txtGroupSearch.Text in Title))
            TemplateSize: =88
            TemplatePadding: =0
            X: =20
            Y: =170
            Width: =700
            Height: =556
          Children:
            - recRowFrame:
                Control: Classic/Button@2.2.0
                Properties:
                  Text: =""
                  Fill: =If(ThisItem.Ticked, RGBA(234,243,225,1), RGBA(255,255,255,1))
                  HoverFill: =Self.Fill
                  PressedFill: =Self.Fill
                  BorderColor: =If(varPreviewGroupID = ThisItem.ID, RGBA(46,110,145,1), If(ThisItem.Ticked, RGBA(59,109,17,1), RGBA(221,227,234,1)))
                  BorderThickness: =If(varPreviewGroupID = ThisItem.ID, 2, 1)
                  RadiusTopLeft: =10
                  RadiusTopRight: =10
                  RadiusBottomLeft: =10
                  RadiusBottomRight: =10
                  X: =0
                  Y: =0
                  Width: =700
                  Height: =82
            - lblGroupName:
                Control: Label@2.5.1
                Properties:
                  Text: =If(Len(ThisItem.Title) > 58, Left(ThisItem.Title, 58) & "...", ThisItem.Title)
                  Tooltip: =ThisItem.Title
                  Wrap: =false
                  Color: =RGBA(31,58,95,1)
                  FontWeight: =FontWeight.Semibold
                  Size: =14
                  Font: =Font.'Open Sans'
                  X: =70
                  Y: =6
                  Width: =520
                  Height: =22
            - pilThursday:
                Control: Classic/Button@2.2.0
                Properties:
                  Text: =If(ThisItem.ThursdayBatch.Value = "Batch 1", "Thursday Batch 1", "Thursday Batch 2")
                  DisplayMode: =DisplayMode.View
                  Visible: =varIsMaintainer && ThisItem.ThursdayBatch.Value <> "None"
                  Fill: =RGBA(224,238,250,1)
                  HoverFill: =Self.Fill
                  PressedFill: =Self.Fill
                  BorderThickness: =0
                  Color: =RGBA(46,110,145,1)
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Semibold
                  Size: =9
                  RadiusTopLeft: =10
                  RadiusTopRight: =10
                  RadiusBottomLeft: =10
                  RadiusBottomRight: =10
                  X: =70
                  Y: =30
                  Width: =130
                  Height: =18
            - pilPrivate:
                Control: Classic/Button@2.2.0
                Properties:
                  Text: ="Private"
                  DisplayMode: =DisplayMode.View
                  Visible: =ThisItem.Private
                  Fill: =RGBA(233,225,245,1)
                  HoverFill: =Self.Fill
                  PressedFill: =Self.Fill
                  BorderThickness: =0
                  Color: =RGBA(107,79,160,1)
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Semibold
                  Size: =9
                  RadiusTopLeft: =10
                  RadiusTopRight: =10
                  RadiusBottomLeft: =10
                  RadiusBottomRight: =10
                  X: =206
                  Y: =30
                  Width: =70
                  Height: =18
            - pilSensitive:
                Control: Classic/Button@2.2.0
                Properties:
                  Text: ="Official Sensitive Approved"
                  DisplayMode: =DisplayMode.View
                  Visible: =ThisItem.OfficialSensitiveApproved
                  Fill: =RGBA(252,231,231,1)
                  HoverFill: =Self.Fill
                  PressedFill: =Self.Fill
                  BorderThickness: =0
                  Color: =RGBA(163,45,45,1)
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Semibold
                  Size: =8
                  RadiusTopLeft: =10
                  RadiusTopRight: =10
                  RadiusBottomLeft: =10
                  RadiusBottomRight: =10
                  X: =282
                  Y: =30
                  Width: =180
                  Height: =18
            - pilOfficialUse:
                Control: Classic/Button@2.2.0
                Properties:
                  Text: ="Official Use Only"
                  DisplayMode: =DisplayMode.View
                  Visible: =ThisItem.OfficialUseOnly
                  Fill: =RGBA(224,238,250,1)
                  HoverFill: =Self.Fill
                  PressedFill: =Self.Fill
                  BorderThickness: =0
                  Color: =RGBA(46,110,145,1)
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Semibold
                  Size: =8
                  RadiusTopLeft: =10
                  RadiusTopRight: =10
                  RadiusBottomLeft: =10
                  RadiusBottomRight: =10
                  X: =468
                  Y: =30
                  Width: =130
                  Height: =18
            - lblMemberMeta:
                Control: Label@2.5.1
                Properties:
                  Text: |-
                    =With(
                        {groupTitle: ThisItem.Title},
                        With(
                            {n: CountRows(Filter(colMemberships, Lower(Trim(GroupName)) = Lower(Trim(groupTitle))))},
                            n & " member" & If(n = 1, "", "s") & " · Last modified " & Text(ThisItem.Modified, "d mmm yyyy")
                        )
                    )
                  Wrap: =false
                  Color: =RGBA(120,120,120,1)
                  Size: =11
                  Font: =Font.'Open Sans'
                  X: =70
                  Y: =52
                  Width: =520
                  Height: =18
            - recRowClickCatcher:
                Control: Classic/Button@2.2.0
                Properties:
                  Text: =""
                  Fill: =RGBA(0,0,0,0)
                  HoverFill: =Self.Fill
                  PressedFill: =Self.Fill
                  BorderThickness: =0
                  OnSelect: =Set(varPreviewGroupID, ThisItem.ID)
                  X: =0
                  Y: =0
                  Width: =700
                  Height: =82
            - recCheckBox:
                Control: CheckBox@0.0.30
                Properties:
                  BasePaletteColor: =RGBA(156, 220, 79, 1)
                  CheckboxSize: =22
                  Checked: =ThisItem.Ticked
                  Label: =""
                  OnCheck: |-
                    =Patch(colGroups, ThisItem, {Ticked: true});
                    Set(varBccForcedByBatch, false);
                    Set(varBccForced, CountRows(Filter(colMemberships As mem, CountRows(Filter(colGroups As grp, grp.Ticked = true && Lower(Trim(grp.Title)) = Lower(Trim(mem.GroupName)))) > 0 && !EndsWith(Lower(mem.Email), "@" & varModDomain))) > 0 || varBccForcedByBatch)
                  OnUncheck: |-
                    =Patch(colGroups, ThisItem, {Ticked: false});
                    Set(varBccForcedByBatch, false);
                    Set(varBccForced, CountRows(Filter(colMemberships As mem, CountRows(Filter(colGroups As grp, grp.Ticked = true && Lower(Trim(grp.Title)) = Lower(Trim(mem.GroupName)))) > 0 && !EndsWith(Lower(mem.Email), "@" & varModDomain))) > 0 || varBccForcedByBatch)
                  X: =20
                  Y: =22
                  Width: =38
                  Height: =38
            - icoViewMembers:
                Control: Classic/Icon@2.5.0
                Properties:
                  Icon: =Icon.View
                  Color: =RGBA(46,110,145,1)
                  Tooltip: ="View members"
                  OnSelect: |-
                    =Set(varLightboxGroupID, ThisItem.ID);
                    Set(varLightboxMode, "members");
                    Set(varShowLightbox, true)
                  X: =600
                  Y: =27
                  Width: =28
                  Height: =28
            - icoViewHistory:
                Control: Classic/Icon@2.5.0
                Properties:
                  Icon: =Icon.History
                  Color: =RGBA(46,110,145,1)
                  Tooltip: ="View history"
                  OnSelect: |-
                    =Set(varLightboxGroupID, ThisItem.ID);
                    Set(varLightboxMode, "history");
                    Set(varShowLightbox, true)
                  X: =640
                  Y: =27
                  Width: =28
                  Height: =28
      - recPreviewBg:
          Control: Classic/Button@2.2.0
          Properties:
            Text: =""
            DisplayMode: =DisplayMode.View
            Visible: =!IsBlank(varPreviewGroupID)
            Fill: =RGBA(255,255,255,1)
            HoverFill: =Self.Fill
            PressedFill: =Self.Fill
            BorderColor: =RGBA(221,227,234,1)
            BorderThickness: =1
            RadiusTopLeft: =10
            RadiusTopRight: =10
            RadiusBottomLeft: =10
            RadiusBottomRight: =10
            X: =760
            Y: =88
            Width: =560
            Height: =160
      - lblPreviewTitle:
          Control: Label@2.5.1
          Properties:
            Text: =If(IsBlank(varPreviewGroupID), "", LookUp(colGroups, ID = varPreviewGroupID).Title)
            Visible: =!IsBlank(varPreviewGroupID)
            Color: =RGBA(31,58,95,1)
            FontWeight: =FontWeight.Bold
            Size: =16
            Font: =Font.'Open Sans'
            X: =778
            Y: =102
            Width: =524
            Height: =28
      - lblPreviewMeta:
          Control: Label@2.5.1
          Properties:
            Text: |-
              =If(IsBlank(varPreviewGroupID), "",
                      With(
                          {g: LookUp(colGroups, ID = varPreviewGroupID)},
                          With(
                              {n: CountRows(Filter(colMemberships, Lower(Trim(GroupName)) = Lower(Trim(g.Title))))},
                              n & " member" & If(n = 1, "", "s") & " · Last modified " & Text(g.Modified, "d mmm yyyy")
                          )
                      )
              )
            Visible: =!IsBlank(varPreviewGroupID)
            Color: =RGBA(120,120,120,1)
            Size: =12
            Font: =Font.'Open Sans'
            X: =778
            Y: =130
            Width: =524
            Height: =20
      - lblPreviewNotes:
          Control: Label@2.5.1
          Properties:
            Text: =If(IsBlank(varPreviewGroupID), "", LookUp(colGroups, ID = varPreviewGroupID).Notes)
            Visible: =!IsBlank(varPreviewGroupID) && !IsBlank(LookUp(colGroups, ID = varPreviewGroupID).Notes)
            Color: =RGBA(90,90,90,1)
            Size: =12
            Font: =Font.'Open Sans'
            X: =778
            Y: =152
            Width: =524
            Height: =32
      - btnSelectOnlyThis:
          Control: ModernButton@1.0.0
          Properties:
            Text: ="Select only this group"
            Visible: =!IsBlank(varPreviewGroupID)
            BasePaletteColor: =RGBA(0,78,66,1)
            OnSelect: |-
              =UpdateIf(colGroups, true, {Ticked: false});
              UpdateIf(colGroups, ID = varPreviewGroupID, {Ticked: true});
              Set(varBccForcedByBatch, false);
              Set(varBccForced, CountRows(Filter(colMemberships As mem, CountRows(Filter(colGroups As grp, grp.Ticked = true && Lower(Trim(grp.Title)) = Lower(Trim(mem.GroupName)))) > 0 && !EndsWith(Lower(mem.Email), "@" & varModDomain))) > 0)
            X: =778
            Y: =188
            Width: =260
            Height: =40
      - btnToggleSelection:
          Control: ModernButton@1.0.0
          Properties:
            Text: =If(IsBlank(varPreviewGroupID), "", If(LookUp(colGroups, ID = varPreviewGroupID).Ticked, "Remove from selection", "Add to selection"))
            Visible: =!IsBlank(varPreviewGroupID)
            BasePaletteColor: =RGBA(120,120,120,1)
            OnSelect: |-
              =UpdateIf(colGroups, ID = varPreviewGroupID, {Ticked: !LookUp(colGroups, ID = varPreviewGroupID).Ticked});
              Set(varBccForcedByBatch, false);
              Set(varBccForced, CountRows(Filter(colMemberships As mem, CountRows(Filter(colGroups As grp, grp.Ticked = true && Lower(Trim(grp.Title)) = Lower(Trim(mem.GroupName)))) > 0 && !EndsWith(Lower(mem.Email), "@" & varModDomain))) > 0)
            X: =1042
            Y: =188
            Width: =260
            Height: =40
      - lblSummaryHeading:
          Control: Label@2.5.1
          Properties:
            Text: ="Send Email"
            Color: =RGBA(31,58,95,1)
            FontWeight: =FontWeight.Bold
            Size: =18
            Font: =Font.'Open Sans'
            X: =760
            Y: =If(IsBlank(varPreviewGroupID), 92, 270)
            Width: =560
            Height: =32
      - lblTickedGroups:
          Control: Label@2.5.1
          Properties:
            Text: '="Groups: " & If(CountRows(Filter(colGroups, Ticked=true)) = 0, "none selected", Concat(Filter(colGroups, Ticked=true), Title, ", "))'
            Color: =RGBA(80,80,80,1)
            Size: =13
            Font: =Font.'Open Sans'
            X: =760
            Y: =If(IsBlank(varPreviewGroupID), 128, 306)
            Width: =560
            Height: =42
      - lblRecipientCount:
          Control: Label@2.5.1
          Properties:
            Text: '="Recipients: " & CountRows(Distinct(Filter(colMemberships As mem, CountRows(Filter(colGroups As grp, grp.Ticked = true && Lower(Trim(grp.Title)) = Lower(Trim(mem.GroupName)))) > 0), Email)) & "  ·  Groups: " & CountRows(Filter(colGroups, Ticked=true)) & "  ·  External: " & CountRows(Filter(Distinct(Filter(colMemberships As mem, CountRows(Filter(colGroups As grp, grp.Ticked = true && Lower(Trim(grp.Title)) = Lower(Trim(mem.GroupName)))) > 0), Email), !EndsWith(Lower(Value), "@" & varModDomain)))'
            Color: =RGBA(31,58,95,1)
            FontWeight: =FontWeight.Bold
            Size: =14
            Font: =Font.'Open Sans'
            X: =760
            Y: =If(IsBlank(varPreviewGroupID), 176, 354)
            Width: =560
            Height: =30
      - segTo:
          Control: ModernButton@1.0.0
          Properties:
            Text: ="To"
            Visible: =!varBccForced
            BasePaletteColor: =If(varRecipientField = "to", RGBA(0,78,66,1), RGBA(220,224,229,1))
            OnSelect: =Set(varRecipientField, "to")
            X: =760
            Y: =If(IsBlank(varPreviewGroupID), 218, 396)
            Width: =174
            Height: =38
      - segCc:
          Control: ModernButton@1.0.0
          Properties:
            Text: ="CC"
            Visible: =!varBccForced
            BasePaletteColor: =If(varRecipientField = "cc", RGBA(0,78,66,1), RGBA(220,224,229,1))
            OnSelect: =Set(varRecipientField, "cc")
            X: =953
            Y: =If(IsBlank(varPreviewGroupID), 218, 396)
            Width: =174
            Height: =38
      - segBcc:
          Control: ModernButton@1.0.0
          Properties:
            Text: ="BCC"
            Visible: =!varBccForced
            BasePaletteColor: =If(varRecipientField = "bcc", RGBA(0,78,66,1), RGBA(220,224,229,1))
            OnSelect: =Set(varRecipientField, "bcc")
            X: =1146
            Y: =If(IsBlank(varPreviewGroupID), 218, 396)
            Width: =174
            Height: =38
      - lblBccForcedNotice:
          Control: Label@2.5.1
          Properties:
            Text: ="BCC is locked for this selection because it includes external addresses or a Thursday batch send."
            Visible: =varBccForced
            Color: =RGBA(138,80,0,1)
            Size: =12
            Font: =Font.'Open Sans'
            X: =760
            Y: =If(IsBlank(varPreviewGroupID), 218, 396)
            Width: =560
            Height: =38
      - lblThursdayHint:
          Control: Label@2.5.1
          Properties:
            Text: ="Maintainer shortcuts for the Thursday send. Batch 1 and Batch 2 are independent recipient sets."
            Visible: =varIsMaintainer
            Color: =RGBA(120,120,120,1)
            Size: =11
            Font: =Font.'Open Sans'
            X: =760
            Y: =If(IsBlank(varPreviewGroupID), 318, 496)
            Width: =560
            Height: =28
      - btnThursdayBatch1:
          Control: ModernButton@1.0.0
          Properties:
            Text: ="Thursday Batch 1"
            Visible: =varIsMaintainer
            BasePaletteColor: =RGBA(46,110,145,1)
            OnSelect: |-
              =UpdateIf(colGroups, true, {Ticked: false});
              UpdateIf(colGroups, ThursdayBatch.Value = "Batch 1", {Ticked: true});
              Set(varBccForcedByBatch, true);
              Set(varBccForced, true)
            X: =760
            Y: =If(IsBlank(varPreviewGroupID), 348, 526)
            Width: =520
            Height: =44
      - icoPreviewBatch1:
          Control: Classic/Icon@2.5.0
          Properties:
            Icon: =Icon.View
            Visible: =varIsMaintainer
            Color: =RGBA(46,110,145,1)
            OnSelect: |-
              =Set(varLightboxMode, "batch1");
              Set(varShowLightbox, true)
            X: =1290
            Y: =If(IsBlank(varPreviewGroupID), 356, 534)
            Width: =28
            Height: =28
      - btnThursdayBatch2:
          Control: ModernButton@1.0.0
          Properties:
            Text: ="Thursday Batch 2"
            Visible: =varIsMaintainer
            BasePaletteColor: =RGBA(46,110,145,1)
            OnSelect: |-
              =UpdateIf(colGroups, true, {Ticked: false});
              UpdateIf(colGroups, ThursdayBatch.Value = "Batch 2", {Ticked: true});
              Set(varBccForcedByBatch, true);
              Set(varBccForced, true)
            X: =760
            Y: =If(IsBlank(varPreviewGroupID), 400, 578)
            Width: =520
            Height: =44
      - icoPreviewBatch2:
          Control: Classic/Icon@2.5.0
          Properties:
            Icon: =Icon.View
            Visible: =varIsMaintainer
            Color: =RGBA(46,110,145,1)
            OnSelect: |-
              =Set(varLightboxMode, "batch2");
              Set(varShowLightbox, true)
            X: =1290
            Y: =If(IsBlank(varPreviewGroupID), 408, 586)
            Width: =28
            Height: =28
      - btnClearSelection:
          Control: ModernButton@1.0.0
          Properties:
            Text: ="Clear Selection"
            BasePaletteColor: =RGBA(120,120,120,1)
            OnSelect: |-
              =UpdateIf(colGroups, true, {Ticked: false});
              Set(varBccForcedByBatch, false);
              Set(varBccForced, false)
            X: =760
            Y: =If(IsBlank(varPreviewGroupID), 462, 640)
            Width: =560
            Height: =40
      - btnOpenOutlook:
          Control: ModernButton@1.0.0
          Properties:
            Text: ="Open New Email in Outlook"
            BasePaletteColor: =RGBA(0,78,66,1)
            OnSelect: |-
              =Set(varEffectiveField, If(varBccForced, "bcc", varRecipientField));
              Set(varRecipients, Distinct(Filter(colMemberships As mem, CountRows(Filter(colGroups As grp, grp.Ticked = true && Lower(Trim(grp.Title)) = Lower(Trim(mem.GroupName)))) > 0), Email));
              Set(varAddressString, Concat(varRecipients, Value, "; "));
              If(
                  CountRows(varRecipients) = 0,
                  Notify("Tick at least one group first.", NotificationType.Warning),
                  Len(EncodeUrl(varAddressString)) > 1800,
                  Copy(varAddressString);
                  Notify("Address list is too long for a mailto link (" & CountRows(varRecipients) & " recipients). Copied to clipboard instead - paste into the " & Upper(varEffectiveField) & " field.", NotificationType.Warning),
                  Launch("mailto:?" & varEffectiveField & "=" & EncodeUrl(varAddressString), {}, LaunchTarget.New)
              )
            X: =760
            Y: =If(IsBlank(varPreviewGroupID), 648, 708)
            Width: =270
            Height: =56
      - btnCopyAddresses:
          Control: ModernButton@1.0.0
          Properties:
            Text: ="Copy Addresses to Clipboard"
            BasePaletteColor: =RGBA(46,110,145,1)
            OnSelect: |-
              =Set(varRecipients, Distinct(Filter(colMemberships As mem, CountRows(Filter(colGroups As grp, grp.Ticked = true && Lower(Trim(grp.Title)) = Lower(Trim(mem.GroupName)))) > 0), Email));
              Set(varAddressString, Concat(varRecipients, Value, "; "));
              If(
                  CountRows(varRecipients) = 0,
                  Notify("Tick at least one group first.", NotificationType.Warning),
                  Copy(varAddressString);
                  Notify("Copied " & CountRows(varRecipients) & " addresses to clipboard.", NotificationType.Success)
              )
            X: =1050
            Y: =If(IsBlank(varPreviewGroupID), 648, 708)
            Width: =270
            Height: =56
      - recLightboxBackdrop:
          Control: Classic/Button@2.2.0
          Properties:
            Text: =""
            Visible: =varShowLightbox
