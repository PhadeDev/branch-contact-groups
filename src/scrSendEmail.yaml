      - icoLightboxClose:
          Control: Classic/Icon@2.5.0
          Properties:
            Icon: =Icon.Cancel
            Visible: =varShowLightbox
            Color: =RGBA(120,120,120,1)
            OnSelect: =Set(varShowLightbox, false)
            X: =983
            Y: =110
            Width: =28
            Height: =28
      - galLightboxMembers:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            Items: |-
              =Switch(varLightboxMode,
                  "members", If(IsBlank(varLightboxGroupID), Filter(colMemberships, false), With({groupTitle: LookUp(colGroups, ID = varLightboxGroupID).Title}, Sort(Filter(colMemberships, Lower(Trim(GroupName)) = Lower(Trim(groupTitle))), Title, SortOrder.Ascending))),
                  "batch1", Sort(AddColumns(GroupBy(Filter(colMemberships As mem, CountRows(Filter(colGroups As grp, grp.ThursdayBatch.Value = "Batch 1" && Lower(Trim(grp.Title)) = Lower(Trim(mem.GroupName)))) > 0), Email, GroupedRows), Title, First(GroupedRows).Title), Title, SortOrder.Ascending),
                  "batch2", Sort(AddColumns(GroupBy(Filter(colMemberships As mem, CountRows(Filter(colGroups As grp, grp.ThursdayBatch.Value = "Batch 2" && Lower(Trim(grp.Title)) = Lower(Trim(mem.GroupName)))) > 0), Email, GroupedRows), Title, First(GroupedRows).Title), Title, SortOrder.Ascending),
                  Filter(colMemberships, false)
              )
            Visible: =varShowLightbox && (varLightboxMode = "members" || varLightboxMode = "batch1" || varLightboxMode = "batch2")
            TemplateSize: =56
            TemplatePadding: =0
            X: =363
            Y: =160
            Width: =640
            Height: =500
          Children:
            - lblLightboxMemberName:
                Control: Label@2.5.1
                Properties:
                  Text: =If(Len(ThisItem.Title) > 60, Left(ThisItem.Title, 60) & "...", ThisItem.Title)
                  Tooltip: =ThisItem.Title
                  Wrap: =false
                  Color: =RGBA(31,58,95,1)
                  FontWeight: =FontWeight.Semibold
                  Size: =14
                  Font: =Font.'Open Sans'
                  X: =0
                  Y: =6
                  Width: =640
                  Height: =22
            - lblLightboxMemberEmail:
                Control: Label@2.5.1
                Properties:
                  Text: =ThisItem.Email
                  Wrap: =false
                  Color: =RGBA(120,120,120,1)
                  Size: =12
                  Font: =Font.'Open Sans'
                  X: =0
                  Y: =28
                  Width: =640
                  Height: =20
      - galLightboxHistory:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            Items: |-
              =If(
                  varLightboxMode = "history" && !IsBlank(varLightboxGroupID),
                  With(
                      {groupTitle: LookUp(colGroups, ID = varLightboxGroupID).Title},
                      Sort(Filter('BM History', Lower(Trim(GroupName)) = Lower(Trim(groupTitle))), Created, SortOrder.Descending)
                  ),
                  Filter('BM History', false)
              )
            Visible: =varShowLightbox && varLightboxMode = "history"
            TemplateSize: =40
            TemplatePadding: =0
            X: =363
            Y: =160
            Width: =640
            Height: =480
          Children:
            - lblLightboxHistoryRow:
                Control: Label@2.5.1
                Properties:
                  Text: =ThisItem.Title & "  ·  " & Text(ThisItem.Created, "d mmm yyyy")
                  Color: =RGBA(50,50,50,1)
                  Size: =13
                  Font: =Font.'Open Sans'
                  X: =0
                  Y: =4
                  Width: =640
                  Height: =32
