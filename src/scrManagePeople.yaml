Screens:
  scrManagePeople:
    Properties:
      Fill: =RGBA(255,255,255,1)
      OnVisible: |-
        =If(
            !varIsMaintainer,
            Back(),
            ClearCollect(colMemberships, 'BM Memberships');
            ClearCollect(colPeople, AddColumns(GroupBy(colMemberships, Email, Rows), Name, First(Rows).Title, GroupCount, CountRows(Rows)));
            Set(varSelectedPersonEmail, Blank());
            Set(varConfirmPurgeArmed, false);
            Set(varShowLightbox, false);
            Set(varPeopleLightboxMode, "addPerson");
            ClearCollect(colPersonGroupPicks, Filter(colGroups, false));
            ClearCollect(colAddPersonPicks, AddColumns(colGroups, Picked, false))
        )
    Children:
      - recHeader:
          Control: Classic/Button@2.2.0
          Properties:
            Text: =""
            DisplayMode: =DisplayMode.View
            Fill: =RGBA(0,78,66,1)
            HoverFill: =RGBA(0,78,66,1)
            PressedFill: =RGBA(0,78,66,1)
            BorderThickness: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            X: =0
            Y: =0
            Width: =1366
            Height: =72
      - icoBack:
          Control: Classic/Icon@2.5.0
          Properties:
            Icon: =Icon.ChevronLeft
            Color: =RGBA(230,241,251,1)
            OnSelect: =Back()
            X: =16
            Y: =24
            Width: =24
            Height: =24
      - lblHeaderTitle:
          Control: Label@2.5.1
          Properties:
            Text: ="Manage People"
            Color: =RGBA(255,255,255,1)
            FontWeight: =FontWeight.Bold
            Size: =18
            Font: =Font.'Open Sans'
            X: =52
            Y: =10
            Width: =600
            Height: =32
      - lblHeaderSub:
          Control: Label@2.5.1
          Properties:
            Text: ="One record per person — tick the groups they belong to"
            Color: =RGBA(214,232,227,1)
            Size: =12
            Font: =Font.'Open Sans'
            X: =52
            Y: =44
            Width: =600
            Height: =22
      - btnAddPersonTrigger:
          Control: ModernButton@1.0.0
          Properties:
            Text: ="+ Add Person"
            BasePaletteColor: =RGBA(46,110,145,1)
            OnSelect: |-
              =Set(varPeopleLightboxMode, "addPerson");
              ClearCollect(colAddPersonPicks, AddColumns(colGroups, Picked, false));
              Reset(txtAddPersonName);
              Reset(txtAddPersonEmail);
              Set(varShowLightbox, true)
            X: =1000
            Y: =16
            Width: =160
            Height: =40
      - btnPurgeTrigger:
          Control: ModernButton@1.0.0
          Properties:
            Text: ="Remove Leaver"
            BasePaletteColor: =RGBA(163,45,45,1)
            OnSelect: |-
              =Set(varPeopleLightboxMode, "purge");
              Reset(txtPurgeSearch);
              Set(varConfirmPurgeArmed, false);
              Set(varShowLightbox, true)
            X: =1180
            Y: =16
            Width: =160
            Height: =40
      - lblAllPeopleHeading:
          Control: Label@2.5.1
          Properties:
            Text: ="All People"
            Color: =RGBA(31,58,95,1)
            FontWeight: =FontWeight.Bold
            Size: =16
            Font: =Font.'Open Sans'
            X: =20
            Y: =88
            Width: =400
            Height: =26
      - txtPeopleSearch:
          Control: ModernTextInput@1.1.0
          Properties:
            Placeholder: ="Search people by name or email..."
            X: =20
            Y: =126
            Width: =620
            Height: =44
      - galPeopleList:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            Items: |-
              =Sort(
                  Filter(colPeople, IsBlank(Trim(txtPeopleSearch.Text)) || txtPeopleSearch.Text in Name || txtPeopleSearch.Text in Email),
                  Name,
                  SortOrder.Ascending
              )
            TemplateSize: =72
            TemplatePadding: =0
            X: =20
            Y: =180
            Width: =1320
            Height: =540
          Children:
            - recPersonRowFrame:
                Control: Classic/Button@2.2.0
                Properties:
                  Text: =""
                  Fill: =If(Lower(ThisItem.Email) = Lower(varSelectedPersonEmail), RGBA(234,243,225,1), RGBA(255,255,255,1))
                  HoverFill: =RGBA(233,241,246,1)
                  PressedFill: =RGBA(233,241,246,1)
                  BorderColor: =RGBA(221,227,234,1)
                  BorderThickness: =1
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  X: =0
                  Y: =0
                  Width: =1320
                  Height: =66
            - lblPersonRowName:
                Control: Label@2.5.1
                Properties:
                  Text: =ThisItem.Name
                  Wrap: =false
                  Color: =RGBA(31,58,95,1)
                  FontWeight: =FontWeight.Semibold
                  Size: =14
                  Font: =Font.'Open Sans'
                  X: =16
                  Y: =6
                  Width: =1280
                  Height: =22
            - lblPersonRowEmail:
                Control: Label@2.5.1
                Properties:
                  Text: =ThisItem.Email & "  ·  member of " & ThisItem.GroupCount & " group" & If(ThisItem.GroupCount = 1, "", "s")
                  Wrap: =false
                  Color: =RGBA(120,120,120,1)
                  Size: =12
                  Font: =Font.'Open Sans'
                  X: =16
                  Y: =30
                  Width: =1280
                  Height: =20
            - recPersonRowClickCatcher:
                Control: Classic/Button@2.2.0
                Properties:
                  Text: =""
                  Fill: =RGBA(0,0,0,0)
                  HoverFill: =Self.Fill
                  PressedFill: =Self.Fill
                  BorderThickness: =0
                  OnSelect: |-
                    =Set(varSelectedPersonEmail, ThisItem.Email);
                    Set(varPeopleLightboxMode, "editPerson");
                    ClearCollect(colPersonGroupPicks, AddColumns(colGroups, Picked, CountRows(Filter(colMemberships, GroupName = Title, Lower(Email) = Lower(ThisItem.Email))) > 0));
                    Reset(txtPersonName);
                    Reset(txtPersonEmail);
                    Set(varShowLightbox, true)
                  X: =0
                  Y: =0
                  Width: =1320
                  Height: =66
      - recLightboxBackdrop:
          Control: Classic/Button@2.2.0
          Properties:
            Text: =""
            Visible: =varShowLightbox
            Fill: =RGBA(15,25,20,0.45)
            HoverFill: =Self.Fill
            PressedFill: =Self.Fill
            BorderThickness: =0
            OnSelect: =Set(varShowLightbox, false); Set(varSelectedPersonEmail, Blank())
            X: =0
            Y: =0
            Width: =1366
            Height: =768
      - recLightboxPanel:
          Control: Classic/Button@2.2.0
          Properties:
            Text: =""
            DisplayMode: =DisplayMode.View
            Visible: =varShowLightbox
            Fill: =RGBA(255,255,255,1)
            HoverFill: =Self.Fill
            PressedFill: =Self.Fill
            BorderThickness: =0
            RadiusTopLeft: =14
            RadiusTopRight: =14
            RadiusBottomLeft: =14
            RadiusBottomRight: =14
            X: =233
            Y: =94
            Width: =900
            Height: =580
      - lblLightboxTitle:
          Control: Label@2.5.1
          Properties:
            Text: =Switch(varPeopleLightboxMode, "addPerson", "Add new person", "editPerson", "Edit person", "purge", "Remove someone from every group", "")
            Visible: =varShowLightbox
            Color: =RGBA(31,58,95,1)
            FontWeight: =FontWeight.Bold
            Size: =18
            Font: =Font.'Open Sans'
            X: =263
            Y: =118
            Width: =760
            Height: =32
      - icoLightboxClose:
          Control: Classic/Icon@2.5.0
          Properties:
            Icon: =Icon.Cancel
            Visible: =varShowLightbox
            Color: =RGBA(120,120,120,1)
            OnSelect: =Set(varShowLightbox, false); Set(varSelectedPersonEmail, Blank())
            X: =1093
            Y: =118
            Width: =28
            Height: =28
      - txtAddPersonName:
          Control: ModernTextInput@1.1.0
          Properties:
            Placeholder: ="Full name"
            Visible: =varShowLightbox && varPeopleLightboxMode = "addPerson"
            X: =263
            Y: =160
            Width: =400
            Height: =42
      - txtAddPersonEmail:
          Control: ModernTextInput@1.1.0
          Properties:
            Placeholder: ="Email address"
            Visible: =varShowLightbox && varPeopleLightboxMode = "addPerson"
            X: =683
            Y: =160
            Width: =400
            Height: =42
      - lblAddToGroupsHeading:
          Control: Label@2.5.1
          Properties:
            Text: ="Add to groups"
            Visible: =varShowLightbox && varPeopleLightboxMode = "addPerson"
            Color: =RGBA(31,58,95,1)
            FontWeight: =FontWeight.Bold
            Size: =14
            Font: =Font.'Open Sans'
            X: =263
            Y: =214
            Width: =400
            Height: =22
      - galAddPersonChecklist:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            Items: =colAddPersonPicks
            Visible: =varShowLightbox && varPeopleLightboxMode = "addPerson"
            TemplateSize: =36
            TemplatePadding: =0
            X: =263
            Y: =244
            Width: =820
            Height: =260
          Children:
            - chkAddPersonGroup:
                Control: CheckBox@0.0.30
                Properties:
                  Label: =ThisItem.Title & If(ThisItem.Private, " (Private)", "")
                  Checked: =ThisItem.Picked
                  OnCheck: |-
                    =Patch(colAddPersonPicks, ThisItem, {Picked: true})
                  OnUncheck: |-
                    =Patch(colAddPersonPicks, ThisItem, {Picked: false})
                  X: =0
                  Y: =2
                  Width: =800
                  Height: =32
      - btnAddPerson:
          Control: ModernButton@1.0.0
          Properties:
            Text: ="Add person"
            Visible: =varShowLightbox && varPeopleLightboxMode = "addPerson"
            BasePaletteColor: =RGBA(0,78,66,1)
            OnSelect: |-
              =Set(varNewPersonEmail, Lower(Trim(txtAddPersonEmail.Text)));
              Set(varNewPersonName, Trim(txtAddPersonName.Text));
              If(
                  IsBlank(varNewPersonName) || IsBlank(Find("@", varNewPersonEmail)) || IsBlank(Find(".", varNewPersonEmail)),
                  Notify("Enter a name and a valid email address.", NotificationType.Warning),
                  CountRows(Filter(colPeople, Lower(Email) = varNewPersonEmail)) > 0,
                  Notify("This email already exists as " & LookUp(colPeople, Lower(Email) = varNewPersonEmail).Name & " — editing them instead.", NotificationType.Warning);
                  Set(varSelectedPersonEmail, varNewPersonEmail);
                  Set(varPeopleLightboxMode, "editPerson");
                  ClearCollect(colPersonGroupPicks, AddColumns(colGroups, Picked, CountRows(Filter(colMemberships, GroupName = Title, Lower(Email) = varNewPersonEmail)) > 0));
                  Reset(txtPersonName);
                  Reset(txtPersonEmail),
                  CountRows(Filter(colAddPersonPicks, Picked = true)) = 0,
                  Notify("Tick at least one group to add them to.", NotificationType.Warning),
                  ForAll(
                      Filter(colAddPersonPicks, Picked = true) As grp,
                      Patch('BM Memberships', Defaults('BM Memberships'), {Title: varNewPersonName, Email: varNewPersonEmail, GroupName: grp.Title});
                      Patch('BM Groups', LookUp('BM Groups', ID = grp.ID), {Title: grp.Title});
                      Patch('BM History', Defaults('BM History'), {Title: varNewPersonName & " added (" & varNewPersonEmail & ")", GroupName: grp.Title, EventType: {Value: "Added"}})
                  );
                  ClearCollect(colMemberships, 'BM Memberships');
                  ClearCollect(colPeople, AddColumns(GroupBy(colMemberships, Email, Rows), Name, First(Rows).Title, GroupCount, CountRows(Rows)));
                  Reset(txtAddPersonName);
                  Reset(txtAddPersonEmail);
                  ClearCollect(colAddPersonPicks, AddColumns(colGroups, Picked, false));
                  Set(varShowLightbox, false);
                  Notify("Added " & varNewPersonName & ".", NotificationType.Success)
              )
            X: =263
            Y: =520
            Width: =300
            Height: =44
      - txtPersonName:
          Control: ModernTextInput@1.1.0
          Properties:
            Default: =If(IsBlank(varSelectedPersonEmail), "", LookUp(colPeople, Email = varSelectedPersonEmail).Name)
            Placeholder: ="Full name"
            Visible: =varShowLightbox && varPeopleLightboxMode = "editPerson"
            X: =263
            Y: =160
            Width: =400
            Height: =42
      - txtPersonEmail:
          Control: ModernTextInput@1.1.0
          Properties:
            Default: =varSelectedPersonEmail
            Placeholder: ="Email address"
            Visible: =varShowLightbox && varPeopleLightboxMode = "editPerson"
            X: =683
            Y: =160
            Width: =400
            Height: =42
      - lblPersonGroupsHeading:
          Control: Label@2.5.1
          Properties:
            Text: ="Groups"
            Visible: =varShowLightbox && varPeopleLightboxMode = "editPerson"
            Color: =RGBA(31,58,95,1)
            FontWeight: =FontWeight.Bold
            Size: =14
            Font: =Font.'Open Sans'
            X: =263
            Y: =214
            Width: =400
            Height: =22
      - galPersonGroupChecklist:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            Items: =colPersonGroupPicks
            Visible: =varShowLightbox && varPeopleLightboxMode = "editPerson"
            TemplateSize: =36
            TemplatePadding: =0
            X: =263
            Y: =244
            Width: =820
            Height: =320
          Children:
            - chkGroupMember:
                Control: CheckBox@0.0.30
                Properties:
                  Label: =ThisItem.Title & If(ThisItem.Private, " (Private)", "")
                  Checked: =ThisItem.Picked
                  OnCheck: |-
                    =Patch(colPersonGroupPicks, ThisItem, {Picked: true})
                  OnUncheck: |-
                    =Patch(colPersonGroupPicks, ThisItem, {Picked: false})
                  X: =0
                  Y: =2
                  Width: =800
                  Height: =32
      - btnSavePersonChanges:
          Control: ModernButton@1.0.0
          Properties:
            Text: ="Save changes"
            Visible: =varShowLightbox && varPeopleLightboxMode = "editPerson"
            BasePaletteColor: =RGBA(0,78,66,1)
            OnSelect: |-
              =With(
                  {oldEmail: Lower(varSelectedPersonEmail), newEmail: Lower(Trim(txtPersonEmail.Text)), newName: Trim(txtPersonName.Text)},
                  If(
                      IsBlank(newName) || IsBlank(Find("@", newEmail)) || IsBlank(Find(".", newEmail)),
                      Notify("Enter a name and a valid email address.", NotificationType.Warning),
                      newEmail <> oldEmail && CountRows(Filter(colPeople, Lower(Email) = newEmail)) > 0,
                      Notify("That email already belongs to another person.", NotificationType.Warning),
                      If(
                          newEmail <> oldEmail,
                          UpdateIf('BM Memberships', Lower(Email) = oldEmail, {Email: newEmail});
                          ClearCollect(colMemberships, 'BM Memberships')
                      );
                      ForAll(
                          colPersonGroupPicks As grp,
                          With(
                              {existing: LookUp(colMemberships, GroupName = grp.Title && Lower(Email) = newEmail)},
                              If(
                                  grp.Picked && IsBlank(existing),
                                  Patch('BM Memberships', Defaults('BM Memberships'), {Title: newName, Email: newEmail, GroupName: grp.Title});
                                  Patch('BM Groups', LookUp('BM Groups', ID = grp.ID), {Title: grp.Title});
                                  Patch('BM History', Defaults('BM History'), {Title: newName & " added (" & newEmail & ")", GroupName: grp.Title, EventType: {Value: "Added"}}),
                                  !grp.Picked && !IsBlank(existing),
                                  Remove('BM Memberships', existing);
                                  Patch('BM Groups', LookUp('BM Groups', ID = grp.ID), {Title: grp.Title});
                                  Patch('BM History', Defaults('BM History'), {Title: newName & " removed (" & newEmail & ")", GroupName: grp.Title, EventType: {Value: "Removed"}}),
                                  grp.Picked && !IsBlank(existing) && (existing.Title <> newName || Lower(existing.Email) <> newEmail),
                                  Patch('BM Memberships', existing, {Title: newName, Email: newEmail})
                              )
                          )
                      );
                      ClearCollect(colMemberships, 'BM Memberships');
                      ClearCollect(colPeople, AddColumns(GroupBy(colMemberships, Email, Rows), Name, First(Rows).Title, GroupCount, CountRows(Rows)));
                      Set(varSelectedPersonEmail, newEmail);
                      Set(varShowLightbox, false);
                      Notify("Saved " & newName & ".", NotificationType.Success)
                  )
              )
            X: =263
            Y: =584
            Width: =260
            Height: =44
      - lblPurgeHint:
          Control: Label@2.5.1
          Properties:
            Text: |-
              ="For when someone leaves the branch entirely — finds every group they're in and removes all of them in one go."
            Visible: =varShowLightbox && varPeopleLightboxMode = "purge"
            Color: =RGBA(120,120,120,1)
            Size: =12
            Font: =Font.'Open Sans'
            X: =263
            Y: =160
            Width: =820
            Height: =36
      - txtPurgeSearch:
          Control: ModernTextInput@1.1.0
          Properties:
            Placeholder: ="Search by name or email..."
            Visible: =varShowLightbox && varPeopleLightboxMode = "purge"
            OnChange: =Set(varConfirmPurgeArmed, false)
            X: =263
            Y: =206
            Width: =820
            Height: =44
      - lblPurgeMatch:
          Control: Label@2.5.1
          Properties:
            Text: |-
              =With(
                  {p: LookUp(colPeople, txtPurgeSearch.Text in Name || txtPurgeSearch.Text in Email)},
                  If(IsBlank(Trim(txtPurgeSearch.Text)), "", IsBlank(p), "No current member matches that.", p.Name & "  —  " & p.Email & "  —  member of " & p.GroupCount & " group" & If(p.GroupCount = 1, "", "s"))
              )
            Visible: =varShowLightbox && varPeopleLightboxMode = "purge"
            Color: =RGBA(80,80,80,1)
            Size: =13
            Font: =Font.'Open Sans'
            X: =263
            Y: =260
            Width: =820
            Height: =50
      - btnPurgeFromAll:
          Control: ModernButton@1.0.0
          Properties:
            Text: =If(varConfirmPurgeArmed, "Tap again to confirm removal", "Remove from all groups")
            Visible: =varShowLightbox && varPeopleLightboxMode = "purge" && !IsBlank(Trim(txtPurgeSearch.Text)) && !IsBlank(LookUp(colPeople, txtPurgeSearch.Text in Name || txtPurgeSearch.Text in Email))
            BasePaletteColor: =RGBA(163,45,45,1)
            OnSelect: |-
              =If(
                  !varConfirmPurgeArmed,
                  Set(varConfirmPurgeArmed, true),
                  Set(varPurgeEmail, LookUp(colPeople, txtPurgeSearch.Text in Name || txtPurgeSearch.Text in Email).Email);
                  Set(varPurgeName, LookUp(colPeople, txtPurgeSearch.Text in Name || txtPurgeSearch.Text in Email).Name);
                  ClearCollect(colPurgeAffectedGroups, Distinct(Filter(colMemberships, Lower(Email) = Lower(varPurgeEmail)), GroupName));
                  Set(varPurgeCount, CountRows(colPurgeAffectedGroups));
                  ForAll(
                      colPurgeAffectedGroups,
                      Patch('BM Groups', LookUp('BM Groups', Title = Value), {Title: Value});
                      Patch('BM History', Defaults('BM History'), {Title: varPurgeName & " removed (left branch — removed from all groups)", GroupName: Value, EventType: {Value: "Removed"}})
                  );
                  RemoveIf('BM Memberships', Lower(Email) = Lower(varPurgeEmail));
                  ClearCollect(colMemberships, 'BM Memberships');
                  ClearCollect(colPeople, AddColumns(GroupBy(colMemberships, Email, Rows), Name, First(Rows).Title, GroupCount, CountRows(Rows)));
                  Reset(txtPurgeSearch);
                  Set(varConfirmPurgeArmed, false);
                  Set(varSelectedPersonEmail, Blank());
                  Set(varShowLightbox, false);
                  Notify("Removed " & varPurgeName & " from " & varPurgeCount & " group" & If(varPurgeCount = 1, "", "s") & ".", NotificationType.Error)
              )
            X: =263
            Y: =320
            Width: =820
            Height: =44
