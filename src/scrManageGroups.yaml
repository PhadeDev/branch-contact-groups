            Height: =24
      - txtGalSearch:
          Control: ModernTextInput@1.1.0
          Properties:
            Placeholder: ="Search GAL by name..."
            Visible: =varShowLightbox && varLightboxMode = "manage" && varManageSubTab = "add"
            X: =183
            Y: =210
            Width: =480
            Height: =44
      - galGalResults:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
