            Visible: =varShowLightbox
            Fill: =RGBA(255,255,255,1)
            HoverFill: =Self.Fill
            PressedFill: =Self.Fill
            BorderThickness: =0
            RadiusTopLeft: =14
            RadiusTopRight: =14
            RadiusBottomLeft: =14
            RadiusBottomRight: =14
            X: =113
            Y: =54
            Width: =1140
            Height: =660
      - lblLightboxTitle:
          Control: Label@2.5.1
          Properties:
            Text: |-
              =If(
                  varLightboxMode = "edit",
                  If(IsBlank(varManageGroupID), "New group", "Edit group"),
                  If(IsBlank(varManageGroupID), "", LookUp(colGroups, ID = varManageGroupID).Title & If(varLightboxMode = "history", " - History", ""))
              )
            Visible: =varShowLightbox
            Color: =RGBA(31,58,95,1)
            FontWeight: =FontWeight.Bold
            Size: =18
            Font: =Font.'Open Sans'
            X: =183
            Y: =78
            Width: =1000
            Height: =32
      - icoLightboxClose:
          Control: Classic/Icon@2.5.0
          Properties:
            Icon: =Icon.Cancel
            Visible: =varShowLightbox
            Color: =RGBA(120,120,120,1)
            OnSelect: =Set(varShowLightbox, false); Set(varManageGroupID, Blank())
            X: =1209
            Y: =78
            Width: =28
            Height: =28
      - txtEditTitle:
          Control: ModernTextInput@1.1.0
          Properties:
            Default: =If(IsBlank(varManageGroupID), "", LookUp(colGroups, ID = varManageGroupID).Title)
            Placeholder: ="Group name"
            Visible: =varShowLightbox && varLightboxMode = "edit"
            X: =183
            Y: =124
            Width: =1000
            Height: =42
      - txtEditNotes:
          Control: ModernTextInput@1.1.0
          Properties:
            Default: =If(IsBlank(varManageGroupID), "", LookUp(colGroups, ID = varManageGroupID).Notes)
            Placeholder: ="Notes (optional)"
            Visible: =varShowLightbox && varLightboxMode = "edit"
            X: =183
            Y: =176
            Width: =1000
            Height: =42
      - drpEditThursdayBatch:
          Control: ModernDropdown@1.0.1
          Properties:
            Items: =colThursdayBatchOptions
            Default: =If(IsBlank(varManageGroupID), LookUp(colThursdayBatchOptions, Value = "None"), LookUp(colThursdayBatchOptions, Value = LookUp(colGroups, ID = varManageGroupID).ThursdayBatch.Value))
            Visible: =varShowLightbox && varLightboxMode = "edit"
            X: =183
            Y: =228
            Width: =200
            Height: =42
      - chkEditPrivate:
          Control: CheckBox@0.0.30
          Properties:
            BasePaletteColor: =RGBA(156, 220, 79, 1)
            CheckboxSize: =22
            Label: ="Private (maintainers only)"
            Checked: =If(IsBlank(varManageGroupID), false, LookUp(colGroups, ID = varManageGroupID).Private)
            Visible: =varShowLightbox && varLightboxMode = "edit"
            X: =183
            Y: =282
            Width: =420
            Height: =32
      - chkEditSensitive:
          Control: CheckBox@0.0.30
          Properties:
            BasePaletteColor: =RGBA(156, 220, 79, 1)
            CheckboxSize: =22
            Label: ="Official Sensitive Approved"
            Checked: =If(IsBlank(varManageGroupID), false, LookUp(colGroups, ID = varManageGroupID).OfficialSensitiveApproved)
            Visible: =varShowLightbox && varLightboxMode = "edit"
            X: =183
            Y: =322
            Width: =420
            Height: =32
      - chkEditOfficialUse:
          Control: CheckBox@0.0.30
          Properties:
            BasePaletteColor: =RGBA(156, 220, 79, 1)
            CheckboxSize: =22
            Label: ="Official Use Only"
            Checked: =If(IsBlank(varManageGroupID), false, LookUp(colGroups, ID = varManageGroupID).OfficialUseOnly)
            Visible: =varShowLightbox && varLightboxMode = "edit"
            X: =183
            Y: =362
            Width: =420
            Height: =32
      - chkOverrideDate:
          Control: CheckBox@0.0.30
          Properties:
            BasePaletteColor: =RGBA(156, 220, 79, 1)
            CheckboxSize: =22
            Label: ="Override last modified date"
            Checked: =If(IsBlank(varManageGroupID), false, !IsBlank(LookUp(colGroups, ID = varManageGroupID).ManuallySetModified))
            Visible: =varShowLightbox && varLightboxMode = "edit"
            X: =183
            Y: =402
            Width: =420
            Height: =32
      - datEditManualDate:
          Control: Classic/DatePicker@2.6.0
          Properties:
            DefaultDate: =If(IsBlank(varManageGroupID) || IsBlank(LookUp(colGroups, ID = varManageGroupID).ManuallySetModified), Today(), LookUp(colGroups, ID = varManageGroupID).ManuallySetModified)
            Visible: =varShowLightbox && varLightboxMode = "edit" && chkOverrideDate.Checked
            X: =603
            Y: =398
            Width: =220
            Height: =40
      - btnSaveGroupEdit:
          Control: ModernButton@1.0.0
          Properties:
            Text: =If(IsBlank(varManageGroupID), "Create group", "Save")
            Visible: =varShowLightbox && varLightboxMode = "edit"
            BasePaletteColor: =RGBA(0,78,66,1)
            OnSelect: |-
              =With(
                  {
                      newTitle: Trim(txtEditTitle.Text),
                      oldTitle: If(IsBlank(varManageGroupID), "", LookUp(colGroups, ID = varManageGroupID).Title)
                  },
                  If(
                      IsBlank(newTitle),
                      Notify("Group name can't be blank.", NotificationType.Warning),
                      CountRows(Filter(colGroups, Lower(Trim(Title)) = Lower(newTitle) && (IsBlank(varManageGroupID) || ID <> varManageGroupID))) > 0,
                      Notify("A group with that name already exists.", NotificationType.Warning),
                      IsBlank(varManageGroupID),
                      Patch('BM Groups', Defaults('BM Groups'), {
                          Title: newTitle,
                          Notes: Trim(txtEditNotes.Text),
                          ThursdayBatch: {Value: drpEditThursdayBatch.Selected.Value},
                          Private: chkEditPrivate.Checked,
                          OfficialSensitiveApproved: chkEditSensitive.Checked,
                          OfficialUseOnly: chkEditOfficialUse.Checked,
                          ManuallySetModified: If(chkOverrideDate.Checked, datEditManualDate.SelectedDate, Blank())
                      });
                      Patch('BM History', Defaults('BM History'), {Title: "Group created", GroupName: newTitle, EventType: {Value: "Created"}});
                      ClearCollect(colGroups, AddColumns(Sort('BM Groups', SortOrder, SortOrder.Ascending), Ticked, false));
                      Set(varShowLightbox, false);
                      Notify("Created " & newTitle & ".", NotificationType.Success),
                      Patch('BM Groups', LookUp('BM Groups', ID = varManageGroupID), {
                          Title: newTitle,
                          Notes: Trim(txtEditNotes.Text),
                          ThursdayBatch: {Value: drpEditThursdayBatch.Selected.Value},
                          Private: chkEditPrivate.Checked,
                          OfficialSensitiveApproved: chkEditSensitive.Checked,
                          OfficialUseOnly: chkEditOfficialUse.Checked,
                          ManuallySetModified: If(chkOverrideDate.Checked, datEditManualDate.SelectedDate, Blank())
                      });
                      If(
                          Lower(Trim(newTitle)) <> Lower(Trim(oldTitle)),
                          UpdateIf('BM Memberships', Lower(Trim(GroupName)) = Lower(Trim(oldTitle)), {GroupName: newTitle});
                          UpdateIf('BM History', Lower(Trim(GroupName)) = Lower(Trim(oldTitle)), {GroupName: newTitle});
                          ClearCollect(colMemberships, 'BM Memberships')
                      );
                      Patch('BM History', Defaults('BM History'), {Title: "Group details updated", GroupName: newTitle, EventType: {Value: "Edited"}});
                      ClearCollect(colGroups, AddColumns(Sort('BM Groups', SortOrder, SortOrder.Ascending), Ticked, false));
                      Set(varShowLightbox, false);
                      Notify("Saved.", NotificationType.Success)
                  )
              )
            X: =183
            Y: =466
            Width: =160
            Height: =44
      - btnCancelGroupEdit:
          Control: ModernButton@1.0.0
