Screens:
  scrManageGroups:
    Properties:
      Fill: =RGBA(255,255,255,1)
      OnVisible: |-
        =If(
            !varIsMaintainer,
            Back(),
            ClearCollect(colGroups, AddColumns(Sort('BM Groups', SortOrder, SortOrder.Ascending), Ticked, false));
            ClearCollect(colMemberships, 'BM Memberships');
            Set(varErrManualName, false);
            Set(varErrManualEmail, false);
            Set(varManageGroupID, Blank());
            Set(varEditingMemberID, Blank());
            Set(varPendingRemoveMemberID, 0);
            Set(varShowLightbox, false);
            Set(varLightboxMode, "history");
            Set(varManageSubTab, "members");
            Set(varParsedRosterCount, 0);
            Set(varParsedRosterSkipped, 0);
            Set(varConfirmReplaceArmed, false);
            ClearCollect(colParsedRoster, Filter(colMemberships, false))
        )
    Children:
      - recHeader:
          Control: Classic/Button@2.2.0
          Properties:
            Text: =""
            DisplayMode: =DisplayMode.View
            Fill: =RGBA(0,78,66,1)
            HoverFill: =RGBA(0,78,66,1)
            PressedFill: =RGBA(0,78,66,1)
            BorderThickness: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            X: =0
            Y: =0
            Width: =1366
            Height: =72
      - icoBack:
          Control: Classic/Icon@2.5.0
          Properties:
            Icon: =Icon.ChevronLeft
            Color: =RGBA(230,241,251,1)
            OnSelect: =Back()
            X: =16
            Y: =24
            Width: =24
            Height: =24
      - lblHeaderTitle:
          Control: Label@2.5.1
          Properties:
            Text: ="Manage Groups"
            Color: =RGBA(255,255,255,1)
            FontWeight: =FontWeight.Bold
            Size: =18
            Font: =Font.'Open Sans'
            X: =52
            Y: =10
            Width: =600
            Height: =32
      - lblHeaderSub:
          Control: Label@2.5.1
          Properties:
            Text: ="Create groups, manage membership, and clear out leavers"
            Color: =RGBA(214,232,227,1)
            Size: =12
            Font: =Font.'Open Sans'
            X: =52
            Y: =44
            Width: =600
            Height: =22
      - btnPeopleNav:
          Control: ModernButton@1.0.0
          Properties:
            Text: ="Manage People"
            BasePaletteColor: =RGBA(46,110,145,1)
            OnSelect: =Navigate(scrManagePeople, ScreenTransition.Cover)
            X: =1180
            Y: =16
            Width: =160
            Height: =40
      - lblAllGroupsHeading:
          Control: Label@2.5.1
          Properties:
            Text: ="All Groups"
            Color: =RGBA(31,58,95,1)
            FontWeight: =FontWeight.Bold
            Size: =16
            Font: =Font.'Open Sans'
            X: =20
            Y: =88
            Width: =400
            Height: =26
      - btnNewGroup:
          Control: ModernButton@1.0.0
          Properties:
            Text: ="+ New Group"
            BasePaletteColor: =RGBA(46,110,145,1)
            OnSelect: |-
              =Set(varManageGroupID, Blank());
              Set(varLightboxMode, "edit");
              Reset(txtEditTitle);
              Reset(txtEditNotes);
              Reset(drpEditThursdayBatch);
              Reset(chkEditPrivate);
              Reset(chkEditSensitive);
              Reset(chkEditOfficialUse);
              Reset(chkOverrideDate);
              Reset(datEditManualDate);
