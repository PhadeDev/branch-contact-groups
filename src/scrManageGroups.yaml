                  Font: =Font.'Open Sans'
                  X: =16
                  Y: =6
                  Width: =800
                  Height: =22
            - lblMemberEmail:
                Control: Label@2.5.1
                Properties:
                  Text: =ThisItem.Email
                  Color: =RGBA(120,120,120,1)
                  Size: =12
                  Font: =Font.'Open Sans'
                  X: =16
                  Y: =28
                  Width: =800
                  Height: =20
            - icoEditMember:
                Control: Classic/Icon@2.5.0
                Properties:
                  Icon: =Icon.Edit
                  Color: =RGBA(46,110,145,1)
                  OnSelect: |-
                    =Set(varEditingMemberID, ThisItem.ID);
                    Set(varManageSubTab, "add");
                    Reset(txtManualName);
                    Reset(txtManualEmail)
                  X: =880
                  Y: =14
                  Width: =28
                  Height: =28
            - icoRemove:
                Control: Classic/Icon@2.5.0
                Properties:
                  Icon: =Icon.Trash
                  Color: =If(varPendingRemoveMemberID = ThisItem.ID, RGBA(255,255,255,1), RGBA(163,45,45,1))
                  Fill: =If(varPendingRemoveMemberID = ThisItem.ID, RGBA(163,45,45,1), RGBA(255,255,255,1))
                  Tooltip: =If(varPendingRemoveMemberID = ThisItem.ID, "Tap again to remove", "Remove member")
                  OnSelect: |-
                    =If(
                        varPendingRemoveMemberID <> ThisItem.ID,
                        Set(varPendingRemoveMemberID, ThisItem.ID);
                        Notify("Tap the red trash icon again to remove " & ThisItem.Title & ".", NotificationType.Warning),
                        Remove('BM Memberships', LookUp('BM Memberships', ID = ThisItem.ID));
                        Remove(colMemberships, ThisItem);
                        Set(varPendingRemoveMemberID, 0);
                        Patch('BM Groups', LookUp('BM Groups', ID = varManageGroupID), {Title: LookUp(colGroups, ID = varManageGroupID).Title});
                        Patch('BM History', Defaults('BM History'), {Title: ThisItem.Title & " removed (" & ThisItem.Email & ")", GroupName: LookUp(colGroups, ID = varManageGroupID).Title, EventType: {Value: "Removed"}});
                        Notify("Removed " & ThisItem.Title & ".", NotificationType.Success)
                    )
                  X: =920
                  Y: =14
                  Width: =28
                  Height: =28
