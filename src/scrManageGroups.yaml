Screens:
  scrManageGroups:
    Properties:
      Fill: =RGBA(255,255,255,1)
      OnVisible: |-
        =If(
            !varIsMaintainer,
            Back(),
            ClearCollect(colMemberships, 'BM Memberships');
            Set(varErrManualName, false);
            Set(varErrManualEmail, false)
        )
    Children:
      - recHeader:
          Control: Classic/Button@2.2.0
          Properties:
            Text: =""
            DisplayMode: =DisplayMode.View
            Fill: =RGBA(0,78,66,1)
            HoverFill: =RGBA(0,78,66,1)
            PressedFill: =RGBA(0,78,66,1)
            BorderThickness: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            X: =0
            Y: =0
            Width: =1366
            Height: =72
      - icoBack:
          Control: Classic/Icon@2.5.0
          Properties:
            Icon: =Icon.ChevronLeft
            Color: =RGBA(230,241,251,1)
            OnSelect: =Back()
            X: =16
            Y: =24
            Width: =24
            Height: =24
      - lblHeaderTitle:
          Control: Label@2.5.1
          Properties:
            Text: ="Manage Groups"
            Color: =RGBA(255,255,255,1)
            FontWeight: =FontWeight.Bold
            Size: =18
            Font: =Font.'Open Sans'
            X: =52
            Y: =10
            Width: =600
            Height: =32
      - lblHeaderSub:
          Control: Label@2.5.1
          Properties:
            Text: ="Add or remove members per group"
            Color: =RGBA(214,232,227,1)
            Size: =12
            Font: =Font.'Open Sans'
            X: =52
            Y: =44
            Width: =600
            Height: =22
      - drpGroup:
          Control: ModernDropdown@1.0.1
          Properties:
            Items: =colGroups
            ItemDisplayText: =ThisItem.Title
            Default: =First(colGroups)
            X: =20
            Y: =96
            Width: =360
            Height: =44
      - lblMembersHeading:
          Control: Label@2.5.1
          Properties:
            Text: ="Members"
            Color: =RGBA(31,58,95,1)
            FontWeight: =FontWeight.Bold
            Size: =16
            Font: =Font.'Open Sans'
            X: =20
            Y: =152
            Width: =360
            Height: =26
      - galMembers:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            Items: =Sort(Filter(colMemberships, GroupName = drpGroup.Selected.Title), Title, SortOrder.Ascending)
            TemplateSize: =64
            TemplatePadding: =0
            X: =20
            Y: =184
            Width: =620
            Height: =540
          Children:
            - lblMemberName:
                Control: Label@2.5.1
                Properties:
                  Text: =ThisItem.Title
                  Color: =RGBA(31,58,95,1)
                  FontWeight: =FontWeight.Semibold
                  Size: =14
                  Font: =Font.'Open Sans'
                  X: =16
                  Y: =8
                  Width: =380
                  Height: =24
            - lblMemberEmail:
                Control: Label@2.5.1
                Properties:
                  Text: =ThisItem.Email
                  Color: =RGBA(120,120,120,1)
                  Size: =12
                  Font: =Font.'Open Sans'
                  X: =16
                  Y: =32
                  Width: =380
                  Height: =22
            - icoRemove:
                Control: Classic/Icon@2.5.0
                Properties:
                  Icon: =Icon.Trash
                  Color: =RGBA(163,45,45,1)
                  OnSelect: |-
                    =Remove('BM Memberships', LookUp('BM Memberships', ID = ThisItem.ID));
                    Remove(colMemberships, ThisItem);
                    Notify("Removed " & ThisItem.Title & ".", NotificationType.Success)
                  X: =560
                  Y: =16
                  Width: =28
                  Height: =28
      - lblAddHeading:
          Control: Label@2.5.1
          Properties:
            Text: ="Add from GAL"
            Color: =RGBA(31,58,95,1)
            FontWeight: =FontWeight.Bold
            Size: =16
            Font: =Font.'Open Sans'
            X: =680
            Y: =96
            Width: =620
            Height: =26
      - txtGalSearch:
          Control: ModernTextInput@1.1.0
          Properties:
            Placeholder: ="Search GAL by name..."
            X: =680
            Y: =128
            Width: =620
            Height: =44
      - galGalResults:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            Items: |-
              =Office365Users.SearchUserV2({searchTerm: txtGalSearch.Text, top: 10}).value
            TemplateSize: =56
            TemplatePadding: =0
            OnSelect: |-
              =Set(varNewRow, Patch('BM Memberships', Defaults('BM Memberships'), {Title: ThisItem.DisplayName, Email: Lower(ThisItem.Mail), GroupName: drpGroup.Selected.Title}));
              Collect(colMemberships, varNewRow);
              Reset(txtGalSearch);
              Notify("Added " & ThisItem.DisplayName & " to " & drpGroup.Selected.Title & ".", NotificationType.Success)
            X: =680
            Y: =180
            Width: =620
            Height: =220
          Children:
            - lblResultName:
                Control: Label@2.5.1
                Properties:
                  Text: =ThisItem.DisplayName
                  Color: =RGBA(31,58,95,1)
                  FontWeight: =FontWeight.Semibold
                  Size: =13
                  Font: =Font.'Open Sans'
                  X: =16
                  Y: =6
                  Width: =420
                  Height: =22
            - lblResultEmail:
                Control: Label@2.5.1
                Properties:
                  Text: =ThisItem.Mail
                  Color: =RGBA(120,120,120,1)
                  Size: =12
                  Font: =Font.'Open Sans'
                  X: =16
                  Y: =28
                  Width: =420
                  Height: =20
      - lblManualHeading:
          Control: Label@2.5.1
          Properties:
            Text: ="Add manually (non-GAL address)"
            Color: =RGBA(31,58,95,1)
            FontWeight: =FontWeight.Bold
            Size: =16
            Font: =Font.'Open Sans'
            X: =680
            Y: =420
            Width: =620
            Height: =26
      - recErrManualName:
          Control: Classic/Button@2.2.0
          Properties:
            Text: =""
            DisplayMode: =DisplayMode.View
            Fill: =RGBA(163,45,45,1)
            HoverFill: =Self.Fill
            PressedFill: =Self.Fill
            BorderThickness: =0
            RadiusTopLeft: =8
            RadiusTopRight: =8
            RadiusBottomLeft: =8
            RadiusBottomRight: =8
            Visible: =varErrManualName
            X: =678
            Y: =454
            Width: =304
            Height: =46
      - txtManualName:
          Control: ModernTextInput@1.1.0
          Properties:
            Placeholder: ="Full name"
            OnChange: =Set(varErrManualName, false)
            X: =680
            Y: =456
            Width: =300
            Height: =42
      - recErrManualEmail:
          Control: Classic/Button@2.2.0
          Properties:
            Text: =""
            DisplayMode: =DisplayMode.View
            Fill: =RGBA(163,45,45,1)
            HoverFill: =Self.Fill
            PressedFill: =Self.Fill
            BorderThickness: =0
            RadiusTopLeft: =8
            RadiusTopRight: =8
            RadiusBottomLeft: =8
            RadiusBottomRight: =8
            Visible: =varErrManualEmail
            X: =988
            Y: =454
            Width: =304
            Height: =46
      - txtManualEmail:
          Control: ModernTextInput@1.1.0
          Properties:
            Placeholder: ="Email address"
            OnChange: =Set(varErrManualEmail, false)
            X: =990
            Y: =456
            Width: =300
            Height: =42
      - btnManualAdd:
          Control: ModernButton@1.0.0
          Properties:
            Text: ="Add"
            BasePaletteColor: =RGBA(0,78,66,1)
            OnSelect: |-
              =Set(varAddedName, Trim(txtManualName.Text));
              Set(varErrManualName, IsBlank(varAddedName));
              Set(varErrManualEmail, IsBlank(Trim(txtManualEmail.Text)) || IsBlank(Find("@", txtManualEmail.Text)) || IsBlank(Find(".", txtManualEmail.Text)));
              If(
                  varErrManualName || varErrManualEmail,
                  Notify("Enter a name and a valid email address.", NotificationType.Warning),
                  Set(varNewRow, Patch('BM Memberships', Defaults('BM Memberships'), {Title: varAddedName, Email: Lower(Trim(txtManualEmail.Text)), GroupName: drpGroup.Selected.Title}));
                  Collect(colMemberships, varNewRow);
                  Reset(txtManualName);
                  Reset(txtManualEmail);
                  Set(varErrManualName, false);
                  Set(varErrManualEmail, false);
                  Notify("Added " & varAddedName & ".", NotificationType.Success)
              )
            X: =680
            Y: =508
            Width: =300
            Height: =48
