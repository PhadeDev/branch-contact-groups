Screens:
  scrManageGroups:
    Properties:
      Fill: =RGBA(255,255,255,1)
      OnVisible: |-
        =If(
            !varIsMaintainer,
            Back(),
            ClearCollect(colMemberships, 'BM Memberships');
            Set(varErrManualName, false);
            Set(varErrManualEmail, false);
            Set(varManageGroupID, Blank());
            Set(varEditingGroupID, Blank());
            Set(varShowCreateGroup, false);
            Set(varParsedRosterCount, 0);
            Set(varParsedRosterSkipped, 0);
            Set(varConfirmReplaceArmed, false);
            ClearCollect(colParsedRoster, Filter(colMemberships, false))
        )
    Children:
      - recHeader:
          Control: Classic/Button@2.2.0
          Properties:
            Text: =""
            DisplayMode: =DisplayMode.View
            Fill: =RGBA(0,78,66,1)
            HoverFill: =RGBA(0,78,66,1)
            PressedFill: =RGBA(0,78,66,1)
            BorderThickness: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            X: =0
            Y: =0
            Width: =1366
            Height: =72
      - icoBack:
          Control: Classic/Icon@2.5.0
          Properties:
            Icon: =Icon.ChevronLeft
            Color: =RGBA(230,241,251,1)
            OnSelect: =Back()
            X: =16
            Y: =24
            Width: =24
            Height: =24
      - lblHeaderTitle:
          Control: Label@2.5.1
          Properties:
            Text: ="Manage Groups"
            Color: =RGBA(255,255,255,1)
            FontWeight: =FontWeight.Bold
            Size: =18
            Font: =Font.'Open Sans'
            X: =52
            Y: =10
            Width: =600
            Height: =32
      - lblHeaderSub:
          Control: Label@2.5.1
          Properties:
            Text: ="Create groups, manage membership, and clear out leavers"
            Color: =RGBA(214,232,227,1)
            Size: =12
            Font: =Font.'Open Sans'
            X: =52
            Y: =44
            Width: =600
            Height: =22
      - btnPeopleNav:
          Control: ModernButton@1.0.0
          Properties:
            Text: ="Manage People"
            BasePaletteColor: =RGBA(46,110,145,1)
            OnSelect: =Navigate(scrManagePeople, ScreenTransition.Cover)
            X: =1180
            Y: =16
            Width: =160
            Height: =40
      - lblAllGroupsHeading:
          Control: Label@2.5.1
          Properties:
            Text: ="All Groups"
            Color: =RGBA(31,58,95,1)
            FontWeight: =FontWeight.Bold
            Size: =16
            Font: =Font.'Open Sans'
            X: =20
            Y: =88
            Width: =400
            Height: =26
      - btnNewGroup:
          Control: ModernButton@1.0.0
          Properties:
            Text: ="+ New Group"
            BasePaletteColor: =RGBA(46,110,145,1)
            OnSelect: =Set(varShowCreateGroup, true)
            X: =1150
            Y: =84
            Width: =190
            Height: =36
      - galAllGroups:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            Items: =colGroups
            TemplateSize: =140
            TemplatePadding: =4
            X: =20
            Y: =130
            Width: =1320
            Height: =360
          Children:
            - recCardFrame:
                Control: Classic/Button@2.2.0
                Properties:
                  Text: =""
                  DisplayMode: =DisplayMode.View
                  Fill: =If(ThisItem.Private, RGBA(241,236,248,1), RGBA(255,255,255,1))
                  HoverFill: =Self.Fill
                  PressedFill: =Self.Fill
                  BorderColor: =If(varManageGroupID = ThisItem.ID, RGBA(0,78,66,1), If(ThisItem.Private, RGBA(107,79,160,1), RGBA(221,227,234,1)))
                  BorderThickness: =If(varManageGroupID = ThisItem.ID, 2, 1)
                  RadiusTopLeft: =10
                  RadiusTopRight: =10
                  RadiusBottomLeft: =10
                  RadiusBottomRight: =10
                  X: =0
                  Y: =0
                  Width: =1320
                  Height: =132
            - lblCardTitleView:
                Control: Label@2.5.1
                Properties:
                  Text: |-
                    =ThisItem.Title
                    & If(ThisItem.ThursdayBatch.Value = "Batch 1", "  [Thursday · Batch 1]", If(ThisItem.ThursdayBatch.Value = "Batch 2", "  [Thursday · Batch 2]", ""))
                    & If(ThisItem.Private, "  [Private]", "")
                    & If(ThisItem.OfficialSensitiveApproved, "  [🔒 Sensitive]", "")
                    & If(ThisItem.OfficialUseOnly, "  [📄 Official Use]", "")
                  Visible: =varEditingGroupID <> ThisItem.ID
                  Color: =RGBA(31,58,95,1)
                  FontWeight: =FontWeight.Bold
                  Size: =15
                  Font: =Font.'Open Sans'
                  X: =16
                  Y: =10
                  Width: =900
                  Height: =26
            - icoEditGroup:
                Control: Classic/Icon@2.5.0
                Properties:
                  Icon: =Icon.Edit
                  Visible: =varEditingGroupID <> ThisItem.ID
                  Color: =RGBA(46,110,145,1)
                  OnSelect: =Set(varEditingGroupID, ThisItem.ID)
                  X: =1260
                  Y: =12
                  Width: =28
                  Height: =28
            - icoHistoryGroup:
                Control: Classic/Icon@2.5.0
                Properties:
                  Icon: =Icon.History
                  Visible: =varEditingGroupID <> ThisItem.ID
                  Color: =RGBA(46,110,145,1)
                  OnSelect: |-
                    =Set(varLightboxGroupID, ThisItem.ID);
                    Set(varLightboxMode, "history");
                    Set(varShowLightbox, true)
                  X: =1220
                  Y: =12
                  Width: =28
                  Height: =28
            - lblCardMetaView:
                Control: Label@2.5.1
                Properties:
                  Text: |-
                    =With(
                        {n: CountRows(Filter(colMemberships, GroupName = ThisItem.Title)), d: DateDiff(ThisItem.Modified, Now(), Days)},
                        n & " member" & If(n = 1, "", "s") & " · Last modified " & Text(ThisItem.Modified, "d mmm yyyy") & " (" & If(d <= 0, "today", d & If(d = 1, " day ago", " days ago")) & ")"
                    )
                  Visible: =varEditingGroupID <> ThisItem.ID
                  Color: =RGBA(120,120,120,1)
                  Size: =12
                  Font: =Font.'Open Sans'
                  X: =16
                  Y: =38
                  Width: =900
                  Height: =20
            - lblCardNotesView:
                Control: Label@2.5.1
                Properties:
                  Text: =ThisItem.Notes
                  Visible: =varEditingGroupID <> ThisItem.ID && !IsBlank(ThisItem.Notes)
                  Color: =RGBA(120,120,120,1)
                  Size: =12
                  Font: =Font.'Open Sans'
                  X: =16
                  Y: =60
                  Width: =900
                  Height: =20
            - btnManageMembers:
                Control: ModernButton@1.0.0
                Properties:
                  Text: ="Manage members"
                  Visible: =varEditingGroupID <> ThisItem.ID
                  BasePaletteColor: =RGBA(46,110,145,1)
                  OnSelect: |-
                    =Set(varManageGroupID, ThisItem.ID);
                    Reset(txtPasteRoster);
                    Set(varParsedRosterCount, 0);
                    Set(varConfirmReplaceArmed, false)
                  X: =16
                  Y: =88
                  Width: =220
                  Height: =36
            - txtEditTitle:
                Control: ModernTextInput@1.1.0
                Properties:
                  Default: =ThisItem.Title
                  Visible: =varEditingGroupID = ThisItem.ID
                  X: =16
                  Y: =8
                  Width: =500
                  Height: =40
            - txtEditNotes:
                Control: ModernTextInput@1.1.0
                Properties:
                  Default: =ThisItem.Notes
                  Placeholder: ="Notes"
                  Visible: =varEditingGroupID = ThisItem.ID
                  X: =16
                  Y: =52
                  Width: =500
                  Height: =40
            - drpEditThursdayBatch:
                Control: ModernDropdown@1.0.1
                Properties:
                  Items: =["None", "Batch 1", "Batch 2"]
                  Default: =ThisItem.ThursdayBatch.Value
                  Visible: =varEditingGroupID = ThisItem.ID
                  X: =530
                  Y: =8
                  Width: =180
                  Height: =40
            - chkEditPrivate:
                Control: Classic/CheckBox@2.1.0
                Properties:
                  Text: ="Private (maintainers only)"
                  Default: =ThisItem.Private
                  Visible: =varEditingGroupID = ThisItem.ID
                  X: =530
                  Y: =52
                  Width: =260
                  Height: =32
            - chkEditSensitive:
                Control: Classic/CheckBox@2.1.0
                Properties:
                  Text: ="Official Sensitive Approved"
                  Default: =ThisItem.OfficialSensitiveApproved
                  Visible: =varEditingGroupID = ThisItem.ID
                  X: =790
                  Y: =52
                  Width: =260
                  Height: =32
            - chkEditOfficialUse:
                Control: Classic/CheckBox@2.1.0
                Properties:
                  Text: ="Official Use Only"
                  Default: =ThisItem.OfficialUseOnly
                  Visible: =varEditingGroupID = ThisItem.ID
                  X: =1050
                  Y: =52
                  Width: =240
                  Height: =32
            - btnSaveGroupEdit:
                Control: ModernButton@1.0.0
                Properties:
                  Text: ="Save"
                  Visible: =varEditingGroupID = ThisItem.ID
                  BasePaletteColor: =RGBA(0,78,66,1)
                  OnSelect: |-
                    =If(
                        IsBlank(Trim(txtEditTitle.Text)),
                        Notify("Group name can't be blank.", NotificationType.Warning),
                        Patch('BM Groups', LookUp('BM Groups', ID = ThisItem.ID), {
                            Title: Trim(txtEditTitle.Text),
                            Notes: Trim(txtEditNotes.Text),
                            ThursdayBatch: {Value: drpEditThursdayBatch.Selected.Value},
                            Private: chkEditPrivate.Value,
                            OfficialSensitiveApproved: chkEditSensitive.Value,
                            OfficialUseOnly: chkEditOfficialUse.Value
                        });
                        Patch('BM History', Defaults('BM History'), {Title: "Group details updated", GroupName: Trim(txtEditTitle.Text), EventType: {Value: "Edited"}});
                        ClearCollect(colGroups, AddColumns(Sort('BM Groups', SortOrder, SortOrder.Ascending), Ticked, false));
                        Set(varEditingGroupID, Blank());
                        Notify("Saved.", NotificationType.Success)
                    )
                  X: =16
                  Y: =92
                  Width: =140
                  Height: =36
            - btnCancelGroupEdit:
                Control: ModernButton@1.0.0
                Properties:
                  Text: ="Cancel"
                  Visible: =varEditingGroupID = ThisItem.ID
                  BasePaletteColor: =RGBA(120,120,120,1)
                  OnSelect: =Set(varEditingGroupID, Blank())
                  X: =166
                  Y: =92
                  Width: =140
                  Height: =36
      - recCreatePanelBg:
          Control: Classic/Button@2.2.0
          Properties:
            Text: =""
            DisplayMode: =DisplayMode.View
            Visible: =varShowCreateGroup
            Fill: =RGBA(255,255,255,1)
            HoverFill: =Self.Fill
            PressedFill: =Self.Fill
            BorderColor: =RGBA(221,227,234,1)
            BorderThickness: =1
            RadiusTopLeft: =10
            RadiusTopRight: =10
            RadiusBottomLeft: =10
            RadiusBottomRight: =10
            X: =20
            Y: =500
            Width: =1320
            Height: =190
      - lblCreateHeading:
          Control: Label@2.5.1
          Properties:
            Text: ="New group"
            Visible: =varShowCreateGroup
            Color: =RGBA(31,58,95,1)
            FontWeight: =FontWeight.Bold
            Size: =16
            Font: =Font.'Open Sans'
            X: =40
            Y: =514
            Width: =400
            Height: =26
      - icoCloseCreate:
          Control: Classic/Icon@2.5.0
          Properties:
            Icon: =Icon.Cancel
            Visible: =varShowCreateGroup
            Color: =RGBA(120,120,120,1)
            OnSelect: =Set(varShowCreateGroup, false)
            X: =1300
            Y: =514
            Width: =24
            Height: =24
      - txtNewGroupTitle:
          Control: ModernTextInput@1.1.0
          Properties:
            Placeholder: ="Group name"
            Visible: =varShowCreateGroup
            X: =40
            Y: =550
            Width: =500
            Height: =40
      - txtNewGroupNotes:
          Control: ModernTextInput@1.1.0
          Properties:
            Placeholder: ="Notes (optional)"
            Visible: =varShowCreateGroup
            X: =40
            Y: =594
            Width: =500
            Height: =40
      - drpNewThursdayBatch:
          Control: ModernDropdown@1.0.1
          Properties:
            Items: =["None", "Batch 1", "Batch 2"]
            Default: ="None"
            Visible: =varShowCreateGroup
            X: =554
            Y: =550
            Width: =180
            Height: =40
      - chkNewPrivate:
          Control: Classic/CheckBox@2.1.0
          Properties:
            Text: ="Private (maintainers only)"
            Default: =false
            Visible: =varShowCreateGroup
            X: =554
            Y: =594
            Width: =260
            Height: =32
      - chkNewSensitive:
          Control: Classic/CheckBox@2.1.0
          Properties:
            Text: ="Official Sensitive Approved"
            Default: =false
            Visible: =varShowCreateGroup
            X: =814
            Y: =594
            Width: =260
            Height: =32
      - chkNewOfficialUse:
          Control: Classic/CheckBox@2.1.0
          Properties:
            Text: ="Official Use Only"
            Default: =false
            Visible: =varShowCreateGroup
            X: =1074
            Y: =594
            Width: =240
            Height: =32
      - btnCreateGroup:
          Control: ModernButton@1.0.0
          Properties:
            Text: ="Create group"
            Visible: =varShowCreateGroup
            BasePaletteColor: =RGBA(0,78,66,1)
            OnSelect: |-
              =If(
                  IsBlank(Trim(txtNewGroupTitle.Text)),
                  Notify("Enter a group name.", NotificationType.Warning),
                  Patch('BM Groups', Defaults('BM Groups'), {
                      Title: Trim(txtNewGroupTitle.Text),
                      Notes: Trim(txtNewGroupNotes.Text),
                      ThursdayBatch: {Value: drpNewThursdayBatch.Selected.Value},
                      Private: chkNewPrivate.Value,
                      OfficialSensitiveApproved: chkNewSensitive.Value,
                      OfficialUseOnly: chkNewOfficialUse.Value
                  });
                  Patch('BM History', Defaults('BM History'), {Title: "Group created", GroupName: Trim(txtNewGroupTitle.Text), EventType: {Value: "Created"}});
                  ClearCollect(colGroups, AddColumns(Sort('BM Groups', SortOrder, SortOrder.Ascending), Ticked, false));
                  Reset(txtNewGroupTitle);
                  Reset(txtNewGroupNotes);
                  Set(varShowCreateGroup, false);
                  Notify("Created " & Trim(txtNewGroupTitle.Text) & ".", NotificationType.Success)
              )
            X: =40
            Y: =638
            Width: =220
            Height: =40
      - lblManagePanelHeading:
          Control: Label@2.5.1
          Properties:
            Text: =If(IsBlank(varManageGroupID), "", LookUp(colGroups, ID = varManageGroupID).Title)
            Visible: =!IsBlank(varManageGroupID)
            Color: =RGBA(31,58,95,1)
            FontWeight: =FontWeight.Bold
            Size: =17
            Font: =Font.'Open Sans'
            X: =20
            Y: =750
            Width: =700
            Height: =30
      - icoCloseManage:
          Control: Classic/Icon@2.5.0
          Properties:
            Icon: =Icon.Cancel
            Visible: =!IsBlank(varManageGroupID)
            Color: =RGBA(120,120,120,1)
            OnSelect: =Set(varManageGroupID, Blank())
            X: =1310
            Y: =750
            Width: =24
            Height: =24
      - lblMembersHeading:
          Control: Label@2.5.1
          Properties:
            Text: ="Members"
            Visible: =!IsBlank(varManageGroupID)
            Color: =RGBA(31,58,95,1)
            FontWeight: =FontWeight.Bold
            Size: =15
            Font: =Font.'Open Sans'
            X: =20
            Y: =792
            Width: =360
            Height: =24
      - galMembers:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            Items: =If(IsBlank(varManageGroupID), Filter(colMemberships, false), Sort(Filter(colMemberships, GroupName = LookUp(colGroups, ID = varManageGroupID).Title), Title, SortOrder.Ascending))
            Visible: =!IsBlank(varManageGroupID)
            TemplateSize: =56
            TemplatePadding: =0
            X: =20
            Y: =824
            Width: =620
            Height: =420
          Children:
            - lblMemberName:
                Control: Label@2.5.1
                Properties:
                  Text: =ThisItem.Title
                  Color: =RGBA(31,58,95,1)
                  FontWeight: =FontWeight.Semibold
                  Size: =14
                  Font: =Font.'Open Sans'
                  X: =16
                  Y: =6
                  Width: =380
                  Height: =22
            - lblMemberEmail:
                Control: Label@2.5.1
                Properties:
                  Text: =ThisItem.Email
                  Color: =RGBA(120,120,120,1)
                  Size: =12
                  Font: =Font.'Open Sans'
                  X: =16
                  Y: =28
                  Width: =380
                  Height: =20
            - icoRemove:
                Control: Classic/Icon@2.5.0
                Properties:
                  Icon: =Icon.Trash
                  Color: =RGBA(163,45,45,1)
                  OnSelect: |-
                    =Remove('BM Memberships', LookUp('BM Memberships', ID = ThisItem.ID));
                    Remove(colMemberships, ThisItem);
                    Patch('BM Groups', LookUp('BM Groups', ID = varManageGroupID), {Title: LookUp(colGroups, ID = varManageGroupID).Title});
                    Patch('BM History', Defaults('BM History'), {Title: ThisItem.Title & " removed (" & ThisItem.Email & ")", GroupName: LookUp(colGroups, ID = varManageGroupID).Title, EventType: {Value: "Removed"}});
                    Notify("Removed " & ThisItem.Title & ".", NotificationType.Success)
                  X: =560
                  Y: =14
                  Width: =28
                  Height: =28
      - lblAddHeading:
          Control: Label@2.5.1
          Properties:
            Text: ="Add from GAL"
            Visible: =!IsBlank(varManageGroupID)
            Color: =RGBA(31,58,95,1)
            FontWeight: =FontWeight.Bold
            Size: =15
            Font: =Font.'Open Sans'
            X: =680
            Y: =792
            Width: =620
            Height: =24
      - txtGalSearch:
          Control: ModernTextInput@1.1.0
          Properties:
            Placeholder: ="Search GAL by name..."
            Visible: =!IsBlank(varManageGroupID)
            X: =680
            Y: =824
            Width: =620
            Height: =44
      - galGalResults:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            Items: |-
              =Office365Users.SearchUserV2({searchTerm: txtGalSearch.Text, top: 10}).value
            Visible: =!IsBlank(varManageGroupID)
            TemplateSize: =56
            TemplatePadding: =0
            X: =680
            Y: =876
            Width: =620
            Height: =160
          Children:
            - lblResultName:
                Control: Label@2.5.1
                Properties:
                  Text: =ThisItem.DisplayName
                  Color: =RGBA(31,58,95,1)
                  FontWeight: =FontWeight.Semibold
                  Size: =13
                  Font: =Font.'Open Sans'
                  X: =16
                  Y: =6
                  Width: =420
                  Height: =22
            - lblResultEmail:
                Control: Label@2.5.1
                Properties:
                  Text: =ThisItem.Mail
                  Color: =RGBA(120,120,120,1)
                  Size: =12
                  Font: =Font.'Open Sans'
                  X: =16
                  Y: =28
                  Width: =420
                  Height: =20
            - recResultTap:
                Control: Classic/Button@2.2.0
                Properties:
                  Text: =""
                  DisplayMode: =DisplayMode.View
                  Fill: =RGBA(0,0,0,0)
                  HoverFill: =RGBA(233,241,246,1)
                  PressedFill: =RGBA(233,241,246,1)
                  BorderThickness: =0
                  OnSelect: |-
                    =If(
                        CountRows(Filter(colMemberships, GroupName = LookUp(colGroups, ID = varManageGroupID).Title, Lower(Email) = Lower(ThisItem.Mail))) > 0,
                        Notify(ThisItem.DisplayName & " is already a member of " & LookUp(colGroups, ID = varManageGroupID).Title & ".", NotificationType.Warning),
                        Set(varNewRow, Patch('BM Memberships', Defaults('BM Memberships'), {Title: ThisItem.DisplayName, Email: Lower(ThisItem.Mail), GroupName: LookUp(colGroups, ID = varManageGroupID).Title}));
                        Collect(colMemberships, varNewRow);
                        Patch('BM Groups', LookUp('BM Groups', ID = varManageGroupID), {Title: LookUp(colGroups, ID = varManageGroupID).Title});
                        Patch('BM History', Defaults('BM History'), {Title: ThisItem.DisplayName & " added (" & Lower(ThisItem.Mail) & ")", GroupName: LookUp(colGroups, ID = varManageGroupID).Title, EventType: {Value: "Added"}});
                        Reset(txtGalSearch);
                        Notify("Added " & ThisItem.DisplayName & " to " & LookUp(colGroups, ID = varManageGroupID).Title & ".", NotificationType.Success)
                    )
                  X: =0
                  Y: =0
                  Width: =620
                  Height: =56
      - lblManualHeading:
          Control: Label@2.5.1
          Properties:
            Text: ="Add manually (non-GAL address)"
            Visible: =!IsBlank(varManageGroupID)
            Color: =RGBA(31,58,95,1)
            FontWeight: =FontWeight.Bold
            Size: =15
            Font: =Font.'Open Sans'
            X: =680
            Y: =1050
            Width: =620
            Height: =24
      - txtManualName:
          Control: ModernTextInput@1.1.0
          Properties:
            Placeholder: ="Full name"
            Visible: =!IsBlank(varManageGroupID)
            OnChange: =Set(varErrManualName, false)
            X: =680
            Y: =1082
            Width: =300
            Height: =42
      - txtManualEmail:
          Control: ModernTextInput@1.1.0
          Properties:
            Placeholder: ="Email address"
            Visible: =!IsBlank(varManageGroupID)
            OnChange: =Set(varErrManualEmail, false)
            X: =990
            Y: =1082
            Width: =300
            Height: =42
      - btnManualAdd:
          Control: ModernButton@1.0.0
          Properties:
            Text: ="Add"
            Visible: =!IsBlank(varManageGroupID)
            BasePaletteColor: =RGBA(0,78,66,1)
            OnSelect: |-
              =Set(varAddedName, Trim(txtManualName.Text));
              Set(varAddedEmail, Lower(Trim(txtManualEmail.Text)));
              Set(varErrManualName, IsBlank(varAddedName));
              Set(varErrManualEmail, IsBlank(varAddedEmail) || IsBlank(Find("@", varAddedEmail)) || IsBlank(Find(".", varAddedEmail)));
              If(
                  varErrManualName || varErrManualEmail,
                  Notify("Enter a name and a valid email address.", NotificationType.Warning),
                  CountRows(Filter(colMemberships, GroupName = LookUp(colGroups, ID = varManageGroupID).Title, Lower(Email) = varAddedEmail)) > 0,
                  Notify("That email is already a member of " & LookUp(colGroups, ID = varManageGroupID).Title & ".", NotificationType.Warning),
                  Set(varNewRow, Patch('BM Memberships', Defaults('BM Memberships'), {Title: varAddedName, Email: varAddedEmail, GroupName: LookUp(colGroups, ID = varManageGroupID).Title}));
                  Collect(colMemberships, varNewRow);
                  Patch('BM Groups', LookUp('BM Groups', ID = varManageGroupID), {Title: LookUp(colGroups, ID = varManageGroupID).Title});
                  Patch('BM History', Defaults('BM History'), {Title: varAddedName & " added manually (" & varAddedEmail & ")", GroupName: LookUp(colGroups, ID = varManageGroupID).Title, EventType: {Value: "Added"}});
                  Reset(txtManualName);
                  Reset(txtManualEmail);
                  Notify("Added " & varAddedName & ".", NotificationType.Success)
              )
            X: =680
            Y: =1134
            Width: =300
            Height: =48
      - lblPasteHeading:
          Control: Label@2.5.1
          Properties:
            Text: ="Replace entire membership (paste from Excel/CSV)"
            Visible: =!IsBlank(varManageGroupID)
            Color: =RGBA(31,58,95,1)
            FontWeight: =FontWeight.Bold
            Size: =15
            Font: =Font.'Open Sans'
            X: =20
            Y: =1270
            Width: =900
            Height: =24
      - lblPasteHint:
          Control: Label@2.5.1
          Properties:
            Text: |-
              ="For the weekly refresh: select the roster in Excel (two columns, Name then Email), copy, and paste below. This replaces every current member of this group in one go."
            Visible: =!IsBlank(varManageGroupID)
            Color: =RGBA(120,120,120,1)
            Size: =12
            Font: =Font.'Open Sans'
            X: =20
            Y: =1298
            Width: =1000
            Height: =36
      - txtPasteRoster:
          Control: ModernTextInput@1.1.0
          Properties:
            Placeholder: ="Paste rows here — Name (Tab) Email, one person per line"
            Mode: =TextMode.MultiLine
            Visible: =!IsBlank(varManageGroupID)
            OnChange: |-
              =Set(varRosterLines, Filter(Split(txtPasteRoster.Text, Char(10)), Trim(Result) <> ""));
              ClearCollect(colParsedRoster,
                  ForAll(
                      varRosterLines,
                      With(
                          {cols: If(Find(Char(9), ThisRecord.Result) > 0, Split(ThisRecord.Result, Char(9)), Split(ThisRecord.Result, ","))},
                          With(
                              {emailVal: Trim(Last(cols).Result), nameVal: Trim(First(cols).Result)},
                              {Name: nameVal, Email: Lower(emailVal)}
                          )
                      )
                  )
              );
              ClearCollect(colParsedRosterValid, Filter(colParsedRoster, IsMatch(Email, Match.Email)));
              Set(varParsedRosterCount, CountRows(colParsedRosterValid));
              Set(varParsedRosterSkipped, CountRows(colParsedRoster) - varParsedRosterCount);
              Set(varConfirmReplaceArmed, false)
            X: =20
            Y: =1338
            Width: =900
            Height: =100
      - lblPastePreview:
          Control: Label@2.5.1
          Properties:
            Text: =If(varParsedRosterCount = 0 && varParsedRosterSkipped = 0, "", varParsedRosterCount & " valid row" & If(varParsedRosterCount = 1, "", "s") & " parsed" & If(varParsedRosterSkipped > 0, ", " & varParsedRosterSkipped & " line" & If(varParsedRosterSkipped = 1, "", "s") & " skipped (no valid email)", "") & ".")
            Visible: =!IsBlank(varManageGroupID)
            Color: =RGBA(120,120,120,1)
            Size: =12
            Font: =Font.'Open Sans'
            X: =20
            Y: =1442
            Width: =900
            Height: =22
      - btnReplaceRoster:
          Control: ModernButton@1.0.0
          Properties:
            Text: =If(varConfirmReplaceArmed, "Tap again to confirm — replaces all " & CountRows(Filter(colMemberships, GroupName = If(IsBlank(varManageGroupID), "", LookUp(colGroups, ID = varManageGroupID).Title))) & " current members", "Replace membership from paste")
            Visible: =!IsBlank(varManageGroupID)
            BasePaletteColor: =RGBA(163,45,45,1)
            OnSelect: |-
              =If(
                  varParsedRosterCount = 0,
                  Notify("Paste some rows first.", NotificationType.Warning),
                  !varConfirmReplaceArmed,
                  Set(varConfirmReplaceArmed, true),
                  Set(varGroupTitle, LookUp(colGroups, ID = varManageGroupID).Title);
                  Set(varOldRosterCount, CountRows(Filter(colMemberships, GroupName = varGroupTitle)));
                  RemoveIf('BM Memberships', GroupName = varGroupTitle);
                  ForAll(colParsedRosterValid, Patch('BM Memberships', Defaults('BM Memberships'), {Title: Name, Email: Email, GroupName: varGroupTitle}));
                  ClearCollect(colMemberships, 'BM Memberships');
                  Patch('BM Groups', LookUp('BM Groups', ID = varManageGroupID), {Title: varGroupTitle});
                  Patch('BM History', Defaults('BM History'), {Title: "Bulk replace via paste: " & varOldRosterCount & " removed, " & varParsedRosterCount & " added", GroupName: varGroupTitle, EventType: {Value: "Replaced"}});
                  Reset(txtPasteRoster);
                  Set(varParsedRosterCount, 0);
                  Set(varParsedRosterSkipped, 0);
                  Set(varConfirmReplaceArmed, false);
                  Notify("Replaced membership of " & varGroupTitle & ".", NotificationType.Success)
              )
            X: =20
            Y: =1470
            Width: =900
            Height: =44
