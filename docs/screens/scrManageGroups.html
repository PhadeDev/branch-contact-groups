operties:\r\n                  Icon: =Icon.Trash\r\n                  Color: =RGBA(163,45,45,1)\r\n                  OnSelect: |-\r\n                    =Remove('BM Memberships', LookUp('BM Memberships', ID = ThisItem.ID));\r\n                    Remove(colMemberships, ThisItem);\r\n                    Notify(\"Removed \" & ThisItem.Title & \".\", NotificationType.Success)\r\n                  X: =560\r\n                  Y: =16\r\n                  Width: =28\r\n                  Height: =28\r\n      - lblAddHeading:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            Text: =\"Add from GAL\"\r\n            Color: =RGBA(31,58,95,1)\r\n            FontWeight: =FontWeight.Bold\r\n            Size: =16\r\n            Font: =Font.'Open Sans'\r\n            X: =680\r\n            Y: =96\r\n            Width: =620\r\n            Height: =26\r\n      - txtGalSearch:\r\n          Control: ModernTextInput@1.1.0\r\n          Properties:\r\n            Placeholder: =\"Search GAL by name...\"\r\n            X: =680\r\n            Y: =128\r\n            Width: =620\r\n            Height: =44\r\n      - galGalResults:\r\n          Control: Gallery@2.15.0\r\n          Variant: Vertical\r\n          Properties:\r\n            Items: |-\r\n              =Office365Users.SearchUserV2({searchTerm: txtGalSearch.Text, top: 10}).value\r\n            TemplateSize: =56\r\n            TemplatePadding: =0\r\n            OnSelect: |-\r\n              =Set(varNewRow, Patch('BM Memberships', Defaults('BM Memberships'), {Title: ThisItem.DisplayName, Email: Lower(ThisItem.Mail), GroupName: drpGroup.Selected.Title}));\r\n              Collect(colMemberships, varNewRow);\r\n              Reset(txtGalSearch);\r\n              Notify(\"Added \" & ThisItem.DisplayName & \" to \" & drpGroup.Selected.Title & \".\", NotificationType.Success)\r\n            X: =680\r\n            Y: =180\r\n            Width: =620\r\n            Height: =220\r\n          Children:\r\n            - lbl me, false)\r\n            X: =680\r\n            Y: =456\r\n            Width: =300\r\n            Height: =42\r\n      - recErrManualEmail:\r\n          Control: Classic/Button@2.2.0\r\n          Properties:\r\n            Text: =\"\"\r\n            DisplayMode: =DisplayMode.View\r\n            Fill: =RGBA(163,45,45,1)\r\n            HoverFill: =Self.Fill\r\n            PressedFill: =Self.Fill\r\n            BorderThickness: =0\r\n            RadiusTopLeft: =8\r\n            RadiusTopRight: =8\r\n            RadiusBottomLeft: =8\r\n            RadiusBottomRight: =8\r\n            Visible: =varErrManualEmail\r\n            X: =988\r\n            Y: =454\r\n            Width: =304\r\n            Height: =46\r\n      - txtManualEmail:\r\n          Control: ModernTextInput@1.1.0\r\n          Properties:\r\n            Placeholder: =\"Email address\"\r\n            OnChange: =Set(varErrManualEmail, false)\r\n            X: =990\r\n            Y: =456\r\n            Width: =300\r\n            Height: =42\r\n      - btnManualAdd:\r\n          Control: ModernButton@1.0.0\r\n          Properties:\r\n            Text: =\"Add\"\r\n            BasePaletteColor: =RGBA(0,78,66,1)\r\n            OnSelect: |-\r\n              =Set(varAddedName, Trim(txtManualName.Text));\r\n              Set(varErrManualName, IsBlank(varAddedName));\r\n              Set(varErrManualEmail, IsBlank(Trim(txtManualEmail.Text)) || IsBlank(Find(\"@\", txtManualEmail.Text)) || IsBlank(Find(\".\", txtManualEmail.Text)));\r\n              If(\r\n                  varErrManualName || varErrManualEmail,\r\n                  Notify(\"Enter a name and a valid email address.\", NotificationType.Warning),\r\n                  Set(varNewRow, Patch('BM Memberships', Defaults('BM Memberships'), {Title: varAddedName, Email: Lower(Trim(txtManualEmail.Text)), GroupName: drpGroup.Selected.Title}));\r\n                  Collect(colMemberships, varNewRow);\r\n                  Reset(txtManualName);\r\n                  Reset(txtManualEmail);\r\n                  Set(varErrManualName, false);\r\n                  Set(varErrManualEmail, false);\r\n                  Notify(\"Added \" & varAddedName & \".\", NotificationType.Success)\r\n              )\r\n            X: =680\r\n            Y: =508\r\n            Width: =300\r\n            Height: =48\r\n";
    const stamp = "v1.0  \u2014  Built 23 Jul 2026  08:46 BST";

    function firstLines() {
      return yaml.split(/\r?\n/).slice(0, 8).join('\n');
    }

    async function copyYAML() {
      const status = document.getElementById('status');
      if (!yaml.startsWith('Screens:\r\n  ') && !yaml.startsWith('Screens:\n  ')) {
        status.textContent = 'Refusing to copy: YAML does not start with Screens:';
        status.className = 'err';
        return;
      }
      if (yaml.includes('\r\n    Control: Screen\r\n') || yaml.includes('\n    Control: Screen\n')) {
        status.textContent = 'Refusing to copy: stale YAML still contains screen-level Control: Screen.';
        status.className = 'err';
        return;
      }
      try {
        await navigator.clipboard.writeText(yaml);
        status.textContent = '✓ Copied ' + stamp + '. First YAML line: ' + yaml.split(/\r?\n/)[0];
        status.className = 'ok';
        setTimeout(() => {
          status.textContent = 'Click to copy again';
          status.className = '';
        }, 4000);
      } catch (e) {
        status.textContent = 'Clipboard blocked — select the text below and copy manually.';
        status.className = 'err';
        const pre = document.createElement('pre');
        pre.style = 'font-size:9px;max-height:200px;overflow:auto;background:#1a1a2e;padding:8px;border-radius:6px;text-align:left;';
        pre.textContent = yaml;
        document.body.appendChild(pre);
      }
    }

    document.getElementById('preview').textContent = 'Clipboard payload preview (' + stamp + ')\n' + firstLines();
  </script>
