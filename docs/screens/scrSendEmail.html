560\r\n            Height: =44\r\n      - lblRecipientCount:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            Text: '=\"Recipients: \" & CountRows(Distinct(Filter(colMemberships, GroupName in Filter(colGroups, Ticked=true).Title), Email))'\r\n            Color: =RGBA(31,58,95,1)\r\n            FontWeight: =FontWeight.Bold\r\n            Size: =16\r\n            Font: =Font.'Open Sans'\r\n            X: =760\r\n            Y: =444\r\n            Width: =560\r\n            Height: =30\r\n      - segTo:\r\n          Control: ModernButton@1.0.0\r\n          Properties:\r\n            Text: =\"To\"\r\n            Visible: =!varBccForced\r\n            BasePaletteColor: =If(varRecipientField = \"to\", RGBA(0,78,66,1), RGBA(220,224,229,1))\r\n            OnSelect: =Set(varRecipientField, \"to\")\r\n            X: =760\r\n            Y: =484\r\n            Width: =120\r\n            Height: =36\r\n      - segCc:\r\n          Control: ModernButton@1.0.0\r\n          Properties:\r\n            Text: =\"CC\"\r\n            Visible: =!varBccForced\r\n            BasePaletteColor: =If(varRecipientField = \"cc\", RGBA(0,78,66,1), RGBA(220,224,229,1))\r\n            OnSelect: =Set(varRecipientField, \"cc\")\r\n            X: =888\r\n            Y: =484\r\n            Width: =120\r\n            Height: =36\r\n      - segBcc:\r\n          Control: ModernButton@1.0.0\r\n          Properties:\r\n            Text: =\"BCC\"\r\n            Visible: =!varBccForced\r\n            BasePaletteColor: =If(varRecipientField = \"bcc\", RGBA(0,78,66,1), RGBA(220,224,229,1))\r\n            OnSelect: =Set(varRecipientField, \"bcc\")\r\n            X: =1016\r\n            Y: =484\r\n            Width: =120\r\n            Height: =36\r\n      - lblBccForcedNotice:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            Text: =\"\u26a0 BCC is required for this selection \u2014 either an external (non-\" & varModDomain & \") address is included, or this is a Thursday batch send. Sending via BCC.\"\r\n            Visible: =varBccForced\r\n            Color: =RGBA(138,80,0,1)\r\n            Size: =12\r\n            Font: =Font.'Open Sans'\r\n            X: =760\r\n            Y: =484\r\n            Width: =560\r\n            Height: =40\r\n      - lblThursdayHint:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            Text: =\"Split in two because one BCC of everyone overloads some mail servers \u2014 the two batches are always different people.\"\r\n            Visible: =varIsMaintainer\r\n            Color: =RGBA(120,120,120,1)\r\n            Size: =11\r\n            Font: =Font.'Open Sans'\r\n            X: =760\r\n            Y: =530\r\n            Width: =560\r\n            Height: =28\r\n      - btnThursdayBatch1:\r\n          Control: ModernButton@1.0.0\r\n          Properties:\r\n            Text: =\"Thursday Batch 1\"\r\n            Visible: =varIsMaintainer\r\n            BasePaletteColor: =RGBA(46,110,145,1)\r\n            OnSelect: |-\r\n              =UpdateIf(colGroups, true, {Ticked: false});\r\n              UpdateIf(colGroups, ThursdayBatch.Value = \"Batch 1\", {Ticked: true});\r\n              Set(varBccForcedByBatch, true);\r\n              Set(varBccForced, true)\r\n            X: =760\r\n            Y: =560\r\n            Width: =460\r\n            Height: =44\r\n      - icoPreviewBatch1:\r\n          Control: Classic/Icon@2.5.0\r\n          Properties:\r\n            Icon: =Icon.View\r\n            Visible: =varIsMaintainer\r\n            Color: =RGBA(46,110,145,1)\r\n            OnSelect: |-\r\n              =Set(varLightboxMode, \"batch1\");\r\n              Set(varShowLightbox, true)\r\n            X: =1230\r\n            Y: =568\r\n            Width: =28\r\n            Height: =28\r\n      - btnThursdayBatch2:\r\n          Control: ModernButton@1.0.0\r\n          Properties:\r\n            Text: =\"Thursday Batch 2\"\r\n            Visible: =varIsMaintainer\r\n            BasePaletteColor: =RGBA(46,110,145,1)\r\n            OnSelect: |-\r\n              =UpdateIf(colGroups, true, {Ticked: false});\r\n              UpdateIf(colGroups, ThursdayBatch.Value = \"Batch 2\", {Ticked: true});\r\n              Set(varBccForcedByBatch, true);\r\n              Set(varBccForced, true)\r\n            X: =760\r\n            Y: =612\r\n            Width: =460\r\n            Height: =44\r\n      - icoPreviewBatch2:\r\n          Control: Classic/Icon@2.5.0\r\n          Properties:\r\n            Icon: =Icon.View\r\n            Visible: =varIsMaintainer\r\n            Color: =RGBA(46,110,145,1)\r\n            OnSelect: |-\r\n              =Set(varLightboxMode, \"batch2\");\r\n              Set(varShowLightbox, true)\r\n            X: =1230\r\n            Y: =620\r\n            Width: =28\r\n            Height: =28\r\n      - btnClearSelection:\r\n          Control: ModernButton@1.0.0\r\n          Properties:\r\n            Text: =\"Clear Selection\"\r\n            BasePaletteColor: =RGBA(120,120,120,1)\r\n            OnSelect: |-\r\n              =UpdateIf(colGroups, true, {Ticked: false});\r\n              Set(varBccForcedByBatch, false);\r\n              Set(varBccForced, false)\r\n            X: =760\r\n            Y: =664\r\n            Width: =560\r\n            Height: =40\r\n      - btnOpenOutlook:\r\n          Control: ModernButton@1.0.0\r\n          Properties:\r\n            Text: =\"Open New Email in Outlook\"\r\n            BasePaletteColor: =RGBA(0,78,66,1)\r\n            OnSelect: |-\r\n              =Set(varEffectiveField, If(varBccForced, \"bcc\", varRecipientField));\r\n              Set(varRecipients, Distinct(Filter(colMemberships, GroupName in Filter(colGroups, Ticked=true).Title), Email));\r\n              Set(varAddressString, Concat(varRecipients, Value, \"; \"));\r\n              If(\r\n                  CountRows(varRecipients) = 0,\r\n                  Notify(\"Tick at least one group first.\", NotificationType.Warning),\r\n                  Len(EncodeUrl(varAddressString)) > 1800,\r\n                  Copy(varAddressString);\r\n                  Notify(\"Address list is too long for a mailto link (\" & CountRows(varRecipients) & \" recipients). Copied to clipboard instead - paste into the \" & Upper(varEffectiveField) & \" field.\", NotificationType.Warning),\r\n                  Launch(\"mailto:?\" & varEffectiveField & \"=\" & EncodeUrl(varAddressString), {}, LaunchTarget.New)\r\n              )\r\n            X: =760\r\n            Y: =708\r\n            Width: =270\r\n            Height: =56\r\n      - btnCopyAddresses:\r\n          Control: ModernButton@1.0.0\r\n          Properties:\r\n            Text: =\"Copy Addresses to Clipboard\"\r\n            BasePaletteColor: =RGBA(46,110,145,1)\r\n            OnSelect: |-\r\n              =Set(varRecipients, Distinct(Filter(colMemberships, GroupName in Filter(colGroups, Ticked=true).Title), Email));\r\n              Set(varAddressString, Concat(varRecipients, Value, \"; \"));\r\n              If(\r\n                  CountRows(varRecipients) = 0,\r\n                  Notify(\"Tick at least one group first.\", NotificationType.Warning),\r\n                  Copy(varAddressString);\r\n                  Notify(\"Copied \" & CountRows(varRecipients) & \" addresses to clipboard.\", NotificationType.Success)\r\n              )\r\n            X: =1050\r\n            Y: =708\r\n            Width: =270\r\n            Height: =56\r\n      - recLightboxBackdrop:\r\n          Control: Classic/Button@2.2.0\r\n          Properties:\r\n            Text: =\"\"\r\n            Visible: =varShowLightbox\r\n            Fill: =RGBA(15,25,20,0.45)\r\n            HoverFill: =Self.Fill\r\n            PressedFill: =Self.Fill\r\n            BorderThickness: =0\r\n            OnSelect: =Set(varShowLightbox, false)\r\n            X: =0\r\n            Y: =0\r\n            Width: =1366\r\n            Height: =768\r\n      - recLightboxPanel:\r\n          Control: Classic/Button@2.2.0\r\n          Properties:\r\n            Text: =\"\"\r\n            DisplayMode: =DisplayMode.View\r\n            Visible: =varShowLightbox\r\n            Fill: =RGBA(255,255,255,1)\r\n            HoverFill: =Self.Fill\r\n            PressedFill: =Self.Fill\r\n            BorderThickness: =0\r\n            RadiusTopLeft: =14\r\n            RadiusTopRight: =14\r\n            RadiusBottomLeft: =14\r\n            RadiusBottomRight: =14\r\n            X: =383\r\n            Y: =84\r\n            Width: =600\r\n            Height: =600\r\n      - lblLightboxTitle:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            Text: |-\r\n              =Switch(varLightboxMode,\r\n                  \"members\", If(IsBlank(varLightboxGroupID), \"\", LookUp(colGroups, ID = varLightboxGroupID).Title),\r\n                  \"history\", If(IsBlank(varLightboxGroupID), \"\", LookUp(colGroups, ID = varLightboxGroupID).Title & \" \u2014 History\"),\r\n                  \"batch1\", \"Thursday Batch 1 \u2014 recipients\",\r\n                  \"batch2\", \"Thursday Batch 2 \u2014 recipients\",\r\n                  \"\"\r\n              )\r\n            Visible: =varShowLightbox\r\n            Color: =RGBA(31,58,95,1)\r\n            FontWeight: =FontWeight.Bold\r\n            Size: =18\r\n            Font: =Font.'Open Sans'\r\n            X: =413\r\n            Y: =110\r\n            Width: =500\r\n            Height: =32\r\n      - icoLightboxClose:\r\n          Control: Classic/Icon@2.5.0\r\n          Properties:\r\n            Icon: =Icon.Cancel\r\n            Visible: =varShowLightbox\r\n            Color: =RGBA(120,120,120,1)\r\n            OnSelect: =Set(varShowLightbox, false)\r\n            X: =933\r\n            Y: =110\r\n            Width: =28\r\n            Height: =28\r\n      - galLightboxMembers:\r\n          Control: Gallery@2.15.0\r\n          Variant: Vertical\r\n          Properties:\r\n            Items: |-\r\n              =Switch(varLightboxMode,\r\n                  \"members\", If(IsBlank(varLightboxGroupID), Filter(colMemberships, false), Sort(Filter(colMemberships, GroupName = LookUp(colGroups, ID = varLightboxGroupID).Title), Title, SortOrder.Ascending)),\r\n                  \"batch1\", Sort(AddColumns(GroupBy(Filter(colMemberships, GroupName in Filter(colGroups, ThursdayBatch.Value = \"Batch 1\").Title), Email, GroupedRows), Title, First(GroupedRows).Title), Title, SortOrder.Ascending),\r\n                  \"batch2\", Sort(AddColumns(GroupBy(Filter(colMemberships, GroupName in Filter(colGroups, ThursdayBatch.Value = \"Batch 2\").Title), Email, GroupedRows), Title, First(GroupedRows).Title), Title, SortOrder.Ascending),\r\n                  Filter(colMemberships, false)\r\n              )\r\n            Visible: =varShowLightbox && (varLightboxMode = \"members\" || varLightboxMode = \"batch1\" || varLightboxMode = \"batch2\")\r\n            TemplateSize: =32\r\n            TemplatePadding: =0\r\n            X: =413\r\n            Y: =160\r\n            Width: =540\r\n            Height: =480\r\n          Children:\r\n            - lblLightboxMemberRow:\r\n                Control: Label@2.5.1\r\n                Properties:\r\n                  Text: =ThisItem.Title & \"  \u2014  \" & ThisItem.Email\r\n                  Color: =RGBA(50,50,50,1)\r\n                  Size: =13\r\n                  Font: =Font.'Open Sans'\r\n                  X: =0\r\n                  Y: =4\r\n                  Width: =540\r\n                  Height: =26\r\n      - galLightboxHistory:\r\n          Control: Gallery@2.15.0\r\n          Variant: Vertical\r\n          Properties:\r\n            Items: =If(varLightboxMode = \"history\" && !IsBlank(varLightboxGroupID), Sort(Filter('BM History', GroupName = LookUp(colGroups, ID = varLightboxGroupID).Title), Created, SortOrder.Descending), Filter('BM History', false))\r\n            Visible: =varShowLightbox && varLightboxMode = \"history\"\r\n            TemplateSize: =40\r\n            TemplatePadding: =0\r\n            X: =413\r\n            Y: =160\r\n            Width: =540\r\n            Height: =480\r\n          Children:\r\n            - lblLightboxHistoryRow:\r\n                Control: Label@2.5.1\r\n                Properties:\r\n                  Text: =ThisItem.Title & \"  \u00b7  \" & Text(ThisItem.Created, \"d mmm yyyy\")\r\n                  Color: =RGBA(50,50,50,1)\r\n                  Size: =13\r\n                  Font: =Font.'Open Sans'\r\n                  X: =0\r\n                  Y: =4\r\n                  Width: =540\r\n                  Height: =32\r\n";
    const stamp = "v2.9  \u2014  Built 24 Jul 2026  03:02 BST";

    function firstLines() {
      return yaml.split(/\r?\n/).slice(0, 8).join('\n');
    }

    async function copyYAML() {
      const status = document.getElementById('status');
      if (!yaml.startsWith('Screens:\r\n  ') && !yaml.startsWith('Screens:\n  ')) {
        status.textContent = 'Refusing to copy: YAML does not start with Screens:';
        status.className = 'err';
        return;
      }
      if (yaml.includes('\r\n    Control: Screen\r\n') || yaml.includes('\n    Control: Screen\n')) {
        status.textContent = 'Refusing to copy: stale YAML still contains screen-level Control: Screen.';
        status.className = 'err';
        return;
      }
      try {
        await navigator.clipboard.writeText(yaml);
        status.textContent = '✓ Copied ' + stamp + '. First YAML line: ' + yaml.split(/\r?\n/)[0];
        status.className = 'ok';
        setTimeout(() => {
          status.textContent = 'Click to copy again';
          status.className = '';
        }, 4000);
      } catch (e) {
        status.textContent = 'Clipboard blocked — select the text below and copy manually.';
        status.className = 'err';
        const pre = document.createElement('pre');
        pre.style = 'font-size:9px;max-height:200px;overflow:auto;background:#1a1a2e;padding:8px;border-radius:6px;text-align:left;';
        pre.textContent = yaml;
        document.body.appendChild(pre);
      }
    }

    document.getElementById('preview').textContent = 'Clipboard payload preview (' + stamp + ')\n' + firstLines();
  </script>
