  <script>
    const yaml = "Screens:\r\n  scrSendEmail:\r\n    Properties:\r\n      Fill: =RGBA(255,255,255,1)\r\n      OnVisible: |-\r\n        =ClearCollect(colGroupsRaw, Sort(Filter('BM Groups', Active = true), SortOrder, SortOrder.Ascending));\r\n        ClearCollect(colGroups, AddColumns(colGroupsRaw, Ticked, false));\r\n        ClearCollect(colMemberships, 'BM Memberships')\r\n    Children:\r\n      - recHeader:\r\n          Control: Classic/Button@2.2.0\r\n          Properties:\r\n            Text: =\"\"\r\n            DisplayMode: =DisplayMode.View\r\n            Fill: =RGBA(0,78,66,1)\r\n            HoverFill: =RGBA(0,78,66,1)\r\n            PressedFill: =RGBA(0,78,66,1)\r\n            BorderThickness: =0\r\n            RadiusTopLeft: =0\r\n            RadiusTopRight: =0\r\n            RadiusBottomLeft: =0\r\n            RadiusBottomRight: =0\r\n            X: =0\r\n            Y: =0\r\n            Width: =1366\r\n            Height: =72\r\n      - lblHeaderTitle:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            Text: =\"Branch Mailer\"\r\n            Color: =RGBA(255,255,255,1)\r\n            FontWeight: =FontWeight.Bold\r\n            Size: =20\r\n            Font: =Font.'Open Sans'\r\n            X: =24\r\n            Y: =10\r\n            Width: =500\r\n            Height: =32\r\n      - lblHeaderSub:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            Text: =\"Send email to group members\"\r\n            Color: =RGBA(214,232,227,1)\r\n            Size: =12\r\n            Font: =Font.'Open Sans'\r\n            X: =24\r\n            Y: =42\r\n            Width: =500\r\n            Height: =22\r\n      - btnManageNav:\r\n          Control: ModernButton@1.0.0\r\n          Properties:\r\n            Text: =\"Manage Groups\"\r\n            BasePaletteColor: =RGBA(46,110,145,1)\r\n            Visible: =varIsMaintainer\r\n            OnSelect: =Navigate(scrManageGroups, ScreenTransition.Cover)\r\n            X: =1180\r\n            Y: =16\r\n            Width: =160\r\n            Height: =40\r\n      - lblLeftHeading:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            Text: =\"Groups\"\r\n            Color: =RGBA(31,58,95,1)\r\n            FontWeight: =FontWeight.Bold\r\n            Size: =16\r\n            Font: =Font.'Open Sans'\r\n            X: =20\r\n            Y: =88\r\n            Width: =300\r\n            Height: =30\r\n      - galGroups:\r\n          Control: Gallery@2.15.0\r\n          Variant: Vertical\r\n          Properties:\r\n            Items: =colGroups\r\n            TemplateSize: =90\r\n            TemplatePadding: =0\r\n            OnSelect: |-\r\n              =Patch(colGroups, ThisItem, {Ticked: !ThisItem.Ticked})\r\n            X: =20\r\n            Y: =126\r\n            Width: =700\r\n            Height: =600\r\n          Children:\r\n            - recCheckBox:\r\n                Control: Classic/Button@2.2.0\r\n                Properties:\r\n                  Text: =\"\"\r\n                  DisplayMode: =DisplayMode.View\r\n                  Fill: =If(ThisItem.Ticked, RGBA(59,109,17,1), RGBA(255,255,255,1))\r\n                  HoverFill: =Self.Fill\r\n                  PressedFill: =Self.Fill\r\n                  BorderColor: =If(ThisItem.Ticked, RGBA(59,109,17,1), RGBA(150,160,175,1))\r\n                  BorderThickness: =2\r\n                  RadiusTopLeft: =4\r\n                  RadiusTopRight: =4\r\n                  RadiusBottomLeft: =4\r\n                  RadiusBottomRight: =4\r\n                  OnSelect: |-\r\n                    =Patch(colGroups, ThisItem, {Ticked: !ThisItem.Ticked})\r\n                  X: =20\r\n                  Y: =20\r\n                  Width: =28\r\n                  Height: =28\r\n            - lblGroupName:\r\n                Control: Label@2.5.1\r\n                Properties:\r\n                  Text: =ThisItem.Title\r\n                  Color: =RGBA(31,58,95,1)\r\n                  FontWeight: =FontWeight.Semibold\r\n                  Size: =16\r\n                  Font: =Font.'Open Sans'\r\n                  X: =64\r\n                  Y: =8\r\n                  Width: =460\r\n                  Height: =26\r\n            - lblMemberCount:\r\n                Control: Label@2.5.1\r\n                Properties:\r\n                  Text: '=With({n: CountRows(Filter(colMemberships, GroupName = ThisItem.Title))}, n & \" member\" & If(n=1, \"\", \"s\"))'\r\n                  Color: =RGBA(120,120,120,1)\r\n                  Size: =12\r\n                  Font: =Font.'Open Sans'\r\n                  X: =64\r\n                  Y: =38\r\n                  Width: =460\r\n                  Height: =20\r\n      - lblSummaryHeading:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            Text: =\"Send Email\"\r\n            Color: =RGBA(31,58,95,1)\r\n            FontWeight: =FontWeight.Bold\r\n            Size: =18\r\n            Font: =Font.'Open Sans'\r\n            X: =760\r\n            Y: =88\r\n            Width: =560\r\n            Height: =32\r\n      - lblTickedGroups:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            Text: '=\"Groups: \" & Concat(Filter(colGroups, Ticked=true), Title, \", \")'\r\n            Color: =RGBA(80,80,80,1)\r\n            Size: =13\r\n            Font: =Font.'Open Sans'\r\n            X: =760\r\n            Y: =128\r\n            Width: =560\r\n            Height: =60\r\n      - lblRecipientCount:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            Text: '=\"Recipients: \" & CountRows(Distinct(Filter(colMemberships, GroupName in Filter(colGroups, Ticked=true).Title), Email))'\r\n            Color: =RGBA(31,58,95,1)\r\n            FontWeight: =FontWeight.Bold\r\n            Size: =16\r\n            Font: =Font.'Open Sans'\r\n            X: =760\r\n            Y: =196\r\n            Width: =560\r\n            Height: =30\r\n      - btnThursdayPreset:\r\n          Control: ModernButton@1.0.0\r\n          Properties:\r\n            Text: =\"Thursday Preset\"\r\n            BasePaletteColor: =RGBA(46,110,145,1)\r\n            OnSelect: |-\r\n              =UpdateIf(colGroups, true, {Ticked: false});\r\n              UpdateIf(colGroups, ThursdayGroup, {Ticked: true})\r\n            X: =760\r\n            Y: =246\r\n            Width: =270\r\n            Height: =48\r\n      - btnClearSelection:\r\n          Control: ModernButton@1.0.0\r\n          Properties:\r\n            Text: =\"Clear Selection\"\r\n            BasePaletteColor: =RGBA(120,120,120,1)\r\n            OnSelect: |-\r\n              =UpdateIf(colGroups, true, {Ticked: false})\r\n            X: =1050\r\n            Y: =246\r\n            Width: =270\r\n            Height: =48\r\n      - btnOpenOutlook:\r\n          Control: ModernButton@1.0.0\r\n          Properties:\r\n            Text: =\"Open New Email in Outlook\"\r\n            BasePaletteColor: =RGBA(0,78,66,1)\r\n            OnSelect: |-\r\n              =Set(varRecipients, Distinct(Filter(colMemberships, GroupName in Filter(colGroups, Ticked=true).Title), Email));\r\n              Set(varAddressString, Concat(varRecipients, Result, \"; \"));\r\n              Reset(txtAddressStaging);\r\n              If(\r\n                  CountRows(varRecipients) = 0,\r\n                  Notify(\"Tick at least one group first.\", NotificationType.Warning),\r\n                  Len(EncodeUrl(varAddressString)) > 1800,\r\n                  Copy(txtAddressStaging);\r\n                  Notify(\"Address list is too long for a mailto link (\" & CountRows(varRecipients) & \" recipients). Copied to clipboard instead - paste into the BCC field.\", NotificationType.Warning),\r\n                  Launch(\"mailto:?bcc=\" & EncodeUrl(varAddressString), {}, LaunchTarget.New)\r\n              )\r\n            X: =760\r\n            Y: =314\r\n            Width: =560\r\n            Height: =56\r\n      - btnCopyAddresses:\r\n          Control: ModernButton@1.0.0\r\n          Properties:\r\n            Text: =\"Copy Addresses to Clipboard\"\r\n            BasePaletteColor: =RGBA(46,110,145,1)\r\n            OnSelect: |-\r\n              =Set(varRecipients, Distinct(Filter(colMemberships, GroupName in Filter(colGroups, Ticked=true).Title), Email));\r\n              Set(varAddressString, Concat(varRecipients, Result, \"; \"));\r\n              Reset(txtAddressStaging);\r\n              If(\r\n                  CountRows(varRecipients) = 0,\r\n                  Notify(\"Tick at least one group first.\", NotificationType.Warning),\r\n                  Copy(txtAddressStaging);\r\n                  Notify(\"Copied \" & CountRows(varRecipients) & \" addresses to clipboard.\", NotificationType.Success)\r\n              )\r\n            X: =760\r\n            Y: =382\r\n            Width: =560\r\n            Height: =56\r\n      - txtAddressStaging:\r\n          Control: ModernTextInput@1.1.0\r\n          Properties:\r\n            Default: =varAddressString\r\n            X: =-2000\r\n            Y: =0\r\n            Width: =300\r\n            Height: =40\r\n";
    const stamp = "v1.0  \u2014  Built 23 Jul 2026  08:46 BST";

    function firstLines() {
      return yaml.split(/\r?\n/).slice(0, 8).join('\n');
    }

    async function copyYAML() {
      const status = document.getElementById('status');
      if (!yaml.startsWith('Screens:\r\n  ') && !yaml.startsWith('Screens:\n  ')) {
        status.textContent = 'Refusing to copy: YAML does not start with Screens:';
        status.className = 'err';
        return;
      }
      if (yaml.includes('\r\n    Control: Screen\r\n') || yaml.includes('\n    Control: Screen\n')) {
        status.textContent = 'Refusing to copy: stale YAML still contains screen-level Control: Screen.';
        status.className = 'err';
        return;
      }
      try {
        await navigator.clipboard.writeText(yaml);
        status.textContent = '✓ Copied ' + stamp + '. First YAML line: ' + yaml.split(/\r?\n/)[0];
        status.className = 'ok';
        setTimeout(() => {
          status.textContent = 'Click to copy again';
          status.className = '';
        }, 4000);
      } catch (e) {
        status.textContent = 'Clipboard blocked — select the text below and copy manually.';
        status.className = 'err';
        const pre = document.createElement('pre');
        pre.style = 'font-size:9px;max-height:200px;overflow:auto;background:#1a1a2e;padding:8px;border-radius:6px;text-align:left;';
        pre.textContent = yaml;
        document.body.appendChild(pre);
      }
    }

    document.getElementById('preview').textContent = 'Clipboard payload preview (' + stamp + ')\n' + firstLines();
  </script>
